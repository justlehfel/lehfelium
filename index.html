<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundRate Pro</title>
    
    <!-- Tailwind CSS pour le design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Phosphor Icons (Icônes ultra modernes) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0f;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Design Verre dépoli (Glassmorphism) */
        .glass-panel {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Cacher la barre de défilement */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input:focus, textarea:focus { outline: none; }
    </style>
</head>
<body class="selection:bg-pink-500 selection:text-white relative">

    <div class="fixed inset-0 z-0 pointer-events-none opacity-40 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-purple-600/30 blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-pink-600/20 blur-[150px] animate-float" style="animation-delay: -3s;"></div>
    </div>

    <div id="auth-screen" class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl animate-fade-in border-t border-l border-white/20">
            <div class="w-16 h-16 bg-gradient-to-br from-pink-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(236,72,153,0.4)]">
                <i class="ph ph-vinyl-record text-3xl text-white"></i>
            </div>
            
            <h1 class="text-3xl font-black text-center mb-2">SoundRate Pro</h1>
            <p class="text-center text-gray-400 mb-8 font-light">Rejoignez la révolution musicale.</p>

            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email audiophile" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:border-pink-500 transition-all">
                <input id="auth-password" type="password" placeholder="Mot de passe secret" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:border-purple-500 transition-all">
                
                <button onclick="handleAuth('login')" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-2xl px-5 py-4 mt-4 transition-transform hover:scale-[1.02] shadow-lg">
                    Se connecter
                </button>
                <button onclick="handleAuth('signup')" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold rounded-2xl px-5 py-4 transition-all">
                    Créer mon compte
                </button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="relative z-10 hidden flex h-screen">
        
        <!-- Sidebar -->
        <nav class="w-20 md:w-64 glass-panel border-r border-white/10 flex flex-col items-center md:items-start py-8 transition-all duration-300">
            <div class="flex items-center gap-3 px-0 md:px-8 mb-12">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center">
                    <i class="ph-fill ph-vinyl-record text-white text-xl"></i>
                </div>
                <span class="text-xl font-black hidden md:block bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">SoundRate</span>
            </div>

            <div class="flex-1 w-full px-4 space-y-2">
                <button onclick="switchView('home')" id="nav-home" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-300 bg-white/10 text-white">
                    <i class="ph ph-house text-2xl"></i> <span class="font-medium hidden md:block">Découverte</span>
                </button>
                <button onclick="switchView('search')" id="nav-search" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5">
                    <i class="ph ph-magnifying-glass text-2xl"></i> <span class="font-medium hidden md:block">Rechercher</span>
                </button>
                <button onclick="switchView('profile')" id="nav-profile" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5">
                    <i class="ph ph-user text-2xl"></i> <span class="font-medium hidden md:block">Mon Profil</span>
                </button>
            </div>

            <div class="w-full px-4 mt-auto">
                <button onclick="logOut()" class="w-full flex items-center gap-4 px-4 py-3 rounded-2xl text-gray-500 hover:text-red-400 hover:bg-red-500/10 transition-all">
                    <i class="ph ph-sign-out text-2xl"></i> <span class="font-medium hidden md:block">Déconnexion</span>
                </button>
            </div>
        </nav>

        <!-- Contenu Dynamique -->
        <main class="flex-1 overflow-y-auto hide-scrollbar p-4 md:p-10" id="main-content">
            <!-- Vues injectées en JavaScript ici -->
        </main>
    </div>

    <script>
        // --- 1. CONFIGURATION SUPABASE ---
        const { createClient } = window.supabase;
        const SUPABASE_URL = 'https://ydzgypqykkwqqnqttaaj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlkemd5cHF5a2t3cXFucXR0YWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjM3NzcsImV4cCI6MjA5NjUzOTc3N30.ax7ZOCH9TffTXBwaR2Jd4gPH8c2rq5Do__gxsjylXOA';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Variables Globales
        let currentUser = null;
        let currentAlbumData = null;
        let currentTracksData = [];
        let trackRatingsState = {}; // Stocke les notes actuelles : { trackId: { score: 8.5, note: '' } }

        // --- 2. GESTION DE L'AUTHENTIFICATION ---
        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                switchView('home');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        }

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Remplissez tous les champs.");

            let result;
            if(type === 'login') result = await supabaseClient.auth.signInWithPassword({ email, password });
            if(type === 'signup') result = await supabaseClient.auth.signUp({ email, password });

            if(result.error) alert(result.error.message);
            else if (type === 'signup') alert("Compte créé ! Connectez-vous maintenant.");
            else checkSession();
        }

        async function logOut() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            checkSession();
        }

        // --- 3. GESTION DES VUES (ROUTING VANILLA JS) ---
        function switchView(viewName) {
            // Mettre à jour l'UI des boutons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-white/10', 'text-white');
                btn.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`nav-${viewName}`);
            if(activeBtn) {
                activeBtn.classList.remove('text-gray-500');
                activeBtn.classList.add('bg-white/10', 'text-white');
            }

            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = ''; // Nettoyer l'écran

            if(viewName === 'home') renderHome(mainContent);
            if(viewName === 'search') renderSearch(mainContent);
            if(viewName === 'album') renderAlbumView(mainContent);
            if(viewName === 'profile') renderProfile(mainContent);
        }

        // --- STREAMING_CHUNK: VUE HOME ---
        function renderHome(container) {
            container.innerHTML = `
                <div class="animate-fade-in">
                    <div class="relative w-full h-[400px] rounded-3xl overflow-hidden mb-12">
                        <div class="absolute inset-0 bg-gradient-to-r from-purple-900 via-pink-900 to-orange-900 animate-gradient opacity-80"></div>
                        <div class="relative z-10 h-full flex flex-col justify-center p-8 md:p-12">
                            <span class="px-4 py-1 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-sm font-medium w-max mb-6">SoundRate Pro v2</span>
                            <h1 class="text-4xl md:text-6xl font-black mb-4 leading-tight">
                                Notez chaque <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-orange-400">vibration.</span>
                            </h1>
                            <p class="text-lg md:text-xl text-gray-300 max-w-2xl">
                                Bienvenue sur la plateforme sociale ultime pour les audiophiles. Recherchez n'importe quel album, notez chaque piste au dixième près.
                            </p>
                            <button onclick="switchView('search')" class="mt-8 bg-white text-black px-8 py-3 rounded-xl font-bold w-max hover:scale-105 transition-transform">
                                Commencer à explorer
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- STREAMING_CHUNK: VUE RECHERCHE (API APPLE MUSIC) ---
        function renderSearch(container) {
            container.innerHTML = `
                <div class="animate-fade-in">
                    <form id="search-form" class="relative mb-10 max-w-3xl mx-auto">
                        <i class="ph ph-magnifying-glass absolute left-6 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl"></i>
                        <input id="search-input" type="text" placeholder="Rechercher un album, un artiste..." class="w-full bg-white/5 border border-white/10 rounded-full py-5 pl-16 pr-6 text-lg text-white focus:border-pink-500 backdrop-blur-md transition-all shadow-xl">
                        <button type="submit" class="absolute right-3 top-3 bottom-3 bg-pink-600 hover:bg-pink-500 text-white rounded-full px-8 font-medium transition-colors">Chercher</button>
                    </form>
                    <div id="search-results" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-5 gap-6"></div>
                </div>
            `;

            document.getElementById('search-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const query = document.getElementById('search-input').value;
                if(!query) return;
                
                const resultsContainer = document.getElementById('search-results');
                resultsContainer.innerHTML = `<div class="col-span-full text-center py-10"><i class="ph ph-spinner-gap animate-spin text-4xl text-pink-500"></i></div>`;

                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=24`);
                    const data = await res.json();
                    
                    resultsContainer.innerHTML = '';
                    data.results.forEach(album => {
                        const highResImage = album.artworkUrl100.replace('100x100bb', '600x600bb'); // Magie pour la HD
                        
                        // Création de la carte d'album
                        const card = document.createElement('div');
                        card.className = "group cursor-pointer animate-fade-in";
                        card.innerHTML = `
                            <div class="aspect-square rounded-2xl overflow-hidden mb-3 border border-white/10 relative shadow-lg">
                                <img src="${highResImage}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                                <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <div class="w-12 h-12 rounded-full bg-pink-500 flex items-center justify-center">
                                        <i class="ph-fill ph-play text-white text-xl"></i>
                                    </div>
                                </div>
                            </div>
                            <h3 class="font-bold text-sm md:text-base leading-tight mb-1 group-hover:text-pink-400 line-clamp-1">${album.collectionName}</h3>
                            <p class="text-gray-400 text-xs md:text-sm truncate">${album.artistName}</p>
                        `;
                        
                        // Action au clic
                        card.onclick = () => {
                            album.artworkUrl100 = highResImage; // Sauver la HD
                            currentAlbumData = album;
                            switchView('album');
                        };
                        
                        resultsContainer.appendChild(card);
                    });
                } catch(e) {
                    resultsContainer.innerHTML = `<p class="text-red-400 col-span-full text-center">Erreur de recherche.</p>`;
                }
            });
        }

        // --- STREAMING_CHUNK: VUE ALBUM & NOTATION ---
        async function renderAlbumView(container) {
            if(!currentAlbumData) return switchView('search');
            
            // Structure de base de la page
            container.innerHTML = `
                <div class="animate-fade-in">
                    <button onclick="switchView('search')" class="flex items-center gap-2 text-gray-400 hover:text-white mb-8 transition-colors">
                        <i class="ph ph-arrow-left text-xl"></i> Retour
                    </button>

                    <!-- HEADER ALBUM -->
                    <div class="relative rounded-3xl overflow-hidden mb-12 p-8 md:p-12 border border-white/10 shadow-2xl">
                        <div class="absolute inset-0 z-0">
                            <img src="${currentAlbumData.artworkUrl100}" class="w-full h-full object-cover blur-3xl opacity-30 scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] via-[#0a0a0f]/80 to-transparent"></div>
                        </div>
                        
                        <div class="relative z-10 flex flex-col md:flex-row gap-10 items-end">
                            <img src="${currentAlbumData.artworkUrl100}" class="w-48 h-48 md:w-64 md:h-64 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/20">
                            <div class="flex-1 w-full">
                                <h1 class="text-4xl md:text-6xl font-black mb-2 leading-tight drop-shadow-lg">${currentAlbumData.collectionName}</h1>
                                <p class="text-xl text-gray-300 font-light mb-6 flex items-center gap-2">
                                    <i class="ph-fill ph-user text-pink-500"></i> ${currentAlbumData.artistName}
                                </p>
                                
                                <div class="glass-panel rounded-2xl p-6 flex flex-col sm:flex-row items-center justify-between gap-6">
                                    <div>
                                        <p class="text-sm text-gray-400 mb-1 uppercase tracking-wider font-bold">Moyenne Globale</p>
                                        <div class="flex items-end gap-2">
                                            <div id="global-score-display" class="text-6xl font-black text-white">0.0</div>
                                            <span class="text-2xl text-gray-500 font-bold mb-1">/ 10</span>
                                        </div>
                                    </div>
                                    
                                    <button onclick="saveRatingsToDB()" class="w-full sm:w-auto bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white px-8 py-4 rounded-xl font-bold transition-all hover:scale-105 shadow-[0_0_20px_rgba(236,72,153,0.4)] flex items-center justify-center gap-2">
                                        <i class="ph ph-floppy-disk text-xl"></i> Sauvegarder
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PISTES -->
                    <div id="tracklist-container" class="space-y-4">
                        <div class="text-center py-10"><i class="ph ph-spinner-gap animate-spin text-4xl text-pink-500"></i></div>
                    </div>
                </div>
            `;

            // Récupérer les chansons de l'album via l'API Apple
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${currentAlbumData.collectionId}&entity=song`);
                const data = await res.json();
                currentTracksData = data.results.filter(item => item.wrapperType === 'track');
                
                // Récupérer les notes existantes depuis Supabase
                await loadExistingRatings();
                
                // Dessiner les pistes
                renderTracks();
            } catch (e) {
                document.getElementById('tracklist-container').innerHTML = `<p class="text-red-500">Erreur lors du chargement des pistes.</p>`;
            }
        }

        // --- STREAMING_CHUNK: GESTION DES NOTES ET CALCULS ---
        async function loadExistingRatings() {
            trackRatingsState = {}; // Réinitialiser
            const { data } = await supabaseClient
                .from('album_ratings')
                .select('track_ratings')
                .eq('user_id', currentUser.id)
                .eq('album_id', currentAlbumData.collectionId.toString())
                .single();
                
            if (data && data.track_ratings) {
                trackRatingsState = data.track_ratings;
            }
        }

        function renderTracks() {
            const container = document.getElementById('tracklist-container');
            container.innerHTML = '<h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i class="ph-fill ph-music-notes text-purple-500"></i> Chansons</h2>';

            currentTracksData.forEach(track => {
                const minutes = Math.floor(track.trackTimeMillis / 60000);
                const seconds = ((track.trackTimeMillis % 60000) / 1000).toFixed(0);
                const timeStr = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                const existingData = trackRatingsState[track.trackId] || { score: '', note: '' };

                const trackDiv = document.createElement('div');
                trackDiv.className = "glass-panel p-5 rounded-2xl flex flex-col lg:flex-row gap-6 border-l-4 border-l-transparent hover:border-l-pink-500 transition-all group";
                trackDiv.innerHTML = `
                    <div class="flex items-center gap-4 lg:w-1/3">
                        <span class="text-gray-500 font-bold w-6">${track.trackNumber}.</span>
                        <div>
                            <h3 class="font-bold text-lg leading-tight text-white group-hover:text-pink-400 transition-colors">${track.trackName}</h3>
                            <p class="text-xs text-gray-500 flex items-center gap-1 mt-1"><i class="ph ph-clock"></i> ${timeStr}</p>
                        </div>
                    </div>
                    
                    <div class="flex-1 flex flex-col sm:flex-row gap-4">
                        <textarea 
                            id="note-${track.trackId}"
                            placeholder="Qu'avez-vous pensé de cette piste ?"
                            class="flex-1 bg-black/40 border border-white/10 rounded-xl p-3 text-sm text-gray-200 focus:border-purple-500 resize-none h-14"
                            onchange="updateTrackState(${track.trackId}, 'note', this.value)"
                        >${existingData.note}</textarea>
                        
                        <div class="flex items-center gap-3 bg-black/40 px-4 rounded-xl border border-white/10">
                            <input 
                                id="score-${track.trackId}"
                                type="number" min="0" max="10" step="0.1" 
                                value="${existingData.score}"
                                oninput="updateTrackState(${track.trackId}, 'score', this.value)"
                                class="w-16 bg-transparent text-center text-2xl font-black text-white focus:outline-none placeholder-gray-700"
                                placeholder="-"
                            >
                            <span class="text-gray-500 font-bold">/ 10</span>
                        </div>
                    </div>
                `;
                container.appendChild(trackDiv);
            });
            
            updateGlobalAverageDisplay();
        }

        // Met à jour l'état local quand on tape dans un input
        window.updateTrackState = function(trackId, field, value) {
            if(!trackRatingsState[trackId]) trackRatingsState[trackId] = { score: '', note: '' };
            trackRatingsState[trackId][field] = value;
            if(field === 'score') updateGlobalAverageDisplay();
        };

        // Calcul Mathématique de la moyenne
        function updateGlobalAverageDisplay() {
            const scores = Object.values(trackRatingsState)
                .map(t => parseFloat(t.score))
                .filter(s => !isNaN(s));
            
            let avg = 0;
            if(scores.length > 0) {
                avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
            }
            
            const display = document.getElementById('global-score-display');
            display.innerText = avg;
            
            // Couleurs conditionnelles
            display.className = `text-6xl font-black ${avg >= 8 ? 'text-green-400' : avg >= 5 ? 'text-yellow-400' : 'text-red-400'}`;
        }

        // Sauvegarder dans Supabase
        window.saveRatingsToDB = async function() {
            const globalAvg = parseFloat(document.getElementById('global-score-display').innerText);
            
            const payload = {
                user_id: currentUser.id,
                album_id: currentAlbumData.collectionId.toString(),
                album_title: currentAlbumData.collectionName,
                artist_name: currentAlbumData.artistName,
                cover_url: currentAlbumData.artworkUrl100,
                global_rating: globalAvg,
                track_ratings: trackRatingsState
            };

            // Vérifier si l'album existe déjà
            const { data: existing } = await supabaseClient
                .from('album_ratings')
                .select('id')
                .eq('user_id', currentUser.id)
                .eq('album_id', payload.album_id);

            let error;
            if (existing && existing.length > 0) {
                // Update
                const res = await supabaseClient.from('album_ratings').update(payload).eq('id', existing[0].id);
                error = res.error;
            } else {
                // Insert
                const res = await supabaseClient.from('album_ratings').insert([payload]);
                error = res.error;
            }

            if (error) alert("Erreur : " + error.message);
            else alert("Album sauvegardé dans votre profil !");
        };

        // --- STREAMING_CHUNK: VUE PROFIL PUBLIC ---
        async function renderProfile(container) {
            container.innerHTML = `<div class="text-center py-20"><i class="ph ph-spinner-gap animate-spin text-4xl text-pink-500"></i></div>`;

            // Récupérer tous les albums notés
            const { data } = await supabaseClient
                .from('album_ratings')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            const ratings = data || [];

            let albumsHTML = '';
            if(ratings.length === 0) {
                albumsHTML = `
                    <div class="col-span-full text-center py-20 glass-panel rounded-3xl">
                        <i class="ph ph-music-notes text-6xl text-gray-600 mb-4"></i>
                        <p class="text-xl text-gray-400">Aucun album noté pour le moment.</p>
                    </div>
                `;
            } else {
                ratings.forEach(rating => {
                    albumsHTML += `
                        <div class="glass-panel p-4 rounded-2xl flex gap-4 group cursor-pointer hover:bg-white/5 transition-all">
                            <img src="${rating.cover_url}" class="w-24 h-24 rounded-xl object-cover shadow-lg group-hover:scale-105 transition-transform">
                            <div class="flex flex-col justify-center">
                                <h3 class="font-bold text-lg leading-tight mb-1 line-clamp-1">${rating.album_title}</h3>
                                <p class="text-sm text-gray-400 mb-3">${rating.artist_name}</p>
                                <div class="inline-flex items-center gap-1 bg-black/40 px-3 py-1 rounded-lg w-max border border-white/5">
                                    <i class="ph-fill ph-star text-yellow-500"></i>
                                    <span class="font-black text-white">${rating.global_rating}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            container.innerHTML = `
                <div class="animate-fade-in">
                    <!-- HEADER PROFIL -->
                    <div class="glass-panel rounded-3xl p-8 mb-12 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden">
                        <div class="w-32 h-32 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 p-1 flex items-center justify-center relative z-10">
                            <div class="w-full h-full bg-[#1a1a24] rounded-full flex items-center justify-center border-4 border-[#0a0a0f]">
                                <i class="ph-fill ph-user text-5xl text-white/50"></i>
                            </div>
                        </div>
                        
                        <div class="flex-1 text-center md:text-left z-10">
                            <h1 class="text-3xl font-black mb-2">${currentUser.email.split('@')[0]}</h1>
                            <p class="text-gray-400 mb-6">${currentUser.email}</p>
                            
                            <div class="flex flex-wrap justify-center md:justify-start gap-4">
                                <div class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl text-center">
                                    <span class="block text-2xl font-black text-pink-400">${ratings.length}</span>
                                    <span class="text-xs text-gray-500 uppercase font-bold tracking-wider">Albums Notés</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i class="ph-fill ph-vinyl-record text-purple-500"></i> Mon Journal Audio</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                        ${albumsHTML}
                    </div>
                </div>
            `;
        }

        // Lancement de l'application
        window.onload = () => {
            checkSession();
        };
    </script>
</body>
</html>
