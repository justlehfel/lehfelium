<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lehfilium - L'Archive Musicale</title>
    
    <!-- Tailwind CSS pour le design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0f; color: #ffffff; overflow-x: hidden; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-panel {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input:focus, textarea:focus { outline: none; }
        
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body class="selection:bg-pink-500 selection:text-white relative">

    <!-- Background Animé -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-40 overflow-hidden">
        <div class="absolute top-[0%] left-[-10%] w-[500px] h-[500px] rounded-full bg-purple-600/30 blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-pink-600/20 blur-[150px] animate-float" style="animation-delay: -3s;"></div>
        <div class="absolute top-[40%] left-[60%] w-[300px] h-[300px] rounded-full bg-blue-600/10 blur-[100px] animate-pulse-slow"></div>
    </div>

    <!-- Conteneur Popups (Toasts) -->
    <div id="toast-container" class="fixed top-6 right-4 md:right-6 z-[100] flex flex-col gap-3"></div>

    <!-- Écran d'authentification -->
    <div id="auth-screen" class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl animate-fade-in border-t border-l border-white/20">
            <div class="w-16 h-16 bg-gradient-to-br from-pink-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(236,72,153,0.4)]">
                <i class="ph ph-vinyl-record text-3xl text-white"></i>
            </div>
            
            <h1 class="text-3xl font-black text-center mb-2">Lehfilium</h1>
            <p class="text-center text-gray-400 mb-8 font-light">L'archive musicale universelle.</p>

            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email audiophile" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:border-pink-500 transition-all">
                <input id="auth-password" type="password" placeholder="Mot de passe" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:border-purple-500 transition-all">
                
                <button onclick="handleAuth('login')" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-2xl px-5 py-4 mt-4 transition-transform hover:scale-[1.02] shadow-lg flex items-center justify-center gap-2">
                    <i class="ph-bold ph-sign-in"></i> Se connecter
                </button>
                <button onclick="handleAuth('signup')" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold rounded-2xl px-5 py-4 transition-all">
                    Créer mon compte
                </button>
            </div>
        </div>
    </div>

    <!-- Application Principale -->
    <div id="app-screen" class="relative z-10 hidden flex-col md:flex-row h-screen overflow-hidden">
        
        <!-- Sidebar Desktop -->
        <nav class="hidden md:flex w-64 glass-panel border-r border-white/10 flex-col py-8 transition-all duration-300 h-full shrink-0 z-20">
            <div class="flex items-center gap-3 px-8 mb-12 cursor-pointer" onclick="switchView('home')">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center shrink-0 shadow-lg">
                    <i class="ph-fill ph-vinyl-record text-white text-xl"></i>
                </div>
                <span class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 tracking-tight">Lehfilium</span>
            </div>

            <div class="flex-1 w-full px-4 space-y-2">
                <button onclick="switchView('home')" id="nav-home" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-300 bg-white/10 text-white">
                    <i class="ph ph-house text-2xl"></i> <span class="font-medium">Accueil</span>
                </button>
                <button onclick="switchView('search')" id="nav-search" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5">
                    <i class="ph ph-magnifying-glass text-2xl"></i> <span class="font-medium">Recherche</span>
                </button>
                <button onclick="switchView('community')" id="nav-community" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5">
                    <i class="ph ph-users-three text-2xl"></i> <span class="font-medium">Communauté</span>
                </button>
                <button onclick="switchView('profile')" id="nav-profile" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5">
                    <i class="ph ph-user text-2xl"></i> <span class="font-medium">Mon Profil</span>
                </button>
            </div>

            <div class="w-full px-4 mt-auto">
                <button onclick="logOut()" class="w-full flex items-center gap-4 px-4 py-3 rounded-2xl text-gray-500 hover:text-red-400 hover:bg-red-500/10 transition-all">
                    <i class="ph ph-sign-out text-2xl"></i> <span class="font-medium">Déconnexion</span>
                </button>
            </div>
        </nav>

        <!-- Navbar Mobile (Bottom) -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 glass-panel border-t border-white/10 z-50 flex justify-around items-center p-2 backdrop-blur-2xl bg-[#0a0a0f]/95 pb-safe">
            <button onclick="switchView('home')" id="nav-mobile-home" class="nav-btn-mobile flex flex-col items-center gap-1 text-pink-400 p-2 transition-colors">
                <i class="ph-fill ph-house text-2xl"></i><span class="text-[10px] font-bold">Accueil</span>
            </button>
            <button onclick="switchView('search')" id="nav-mobile-search" class="nav-btn-mobile flex flex-col items-center gap-1 text-gray-500 hover:text-white p-2 transition-colors">
                <i class="ph-fill ph-magnifying-glass text-2xl"></i><span class="text-[10px] font-bold">Recherche</span>
            </button>
            <button onclick="switchView('community')" id="nav-mobile-community" class="nav-btn-mobile flex flex-col items-center gap-1 text-gray-500 hover:text-white p-2 transition-colors">
                <i class="ph-fill ph-users-three text-2xl"></i><span class="text-[10px] font-bold">Social</span>
            </button>
            <button onclick="switchView('profile')" id="nav-mobile-profile" class="nav-btn-mobile flex flex-col items-center gap-1 text-gray-500 hover:text-white p-2 transition-colors">
                <i class="ph-fill ph-user text-2xl"></i><span class="text-[10px] font-bold">Profil</span>
            </button>
        </nav>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto hide-scrollbar p-4 md:p-10 pb-28 md:pb-10 relative z-10 w-full" id="main-content">
            <!-- Vues injectées ici -->
        </main>
    </div>

    <script>
        // --- INITIALISATION SUPABASE ---
        const { createClient } = window.supabase;
        const SUPABASE_URL = 'https://ydzgypqykkwqqnqttaaj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlkemd5cHF5a2t3cXFucXR0YWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjM3NzcsImV4cCI6MjA5NjUzOTc3N30.ax7ZOCH9TffTXBwaR2Jd4gPH8c2rq5Do__gxsjylXOA';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Variables Globales
        let currentUser = null;
        let currentAlbumData = null;
        let currentArtistData = null;
        let currentTracksData = [];
        let trackRatingsState = {};
        
        let currentSearchQuery = "";
        let currentSearchFilter = "tous"; 

        // --- TOAST NOTIFICATIONS ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isError = type === 'error';
            toast.className = `glass-panel ${isError ? 'bg-red-500/20 border-red-500/50' : 'bg-green-500/20 border-green-500/50'} px-5 py-3 rounded-2xl flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 shadow-2xl backdrop-blur-3xl`;
            toast.innerHTML = `<i class="ph-fill ${isError ? 'ph-warning-circle text-red-400' : 'ph-check-circle text-green-400'} text-xl"></i><span class="font-medium text-white text-sm">${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- AUTHENTIFICATION ---
        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                const urlParams = new URLSearchParams(window.location.search);
                const sharedUserId = urlParams.get('user');
                
                if (sharedUserId) {
                    renderProfile(document.getElementById('main-content'), sharedUserId);
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else {
                    switchView('home');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        }

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return showToast("Veuillez remplir tous les champs.", "error");

            let result;
            if(type === 'login') result = await supabaseClient.auth.signInWithPassword({ email, password });
            if(type === 'signup') result = await supabaseClient.auth.signUp({ email, password });

            if(result.error) showToast(result.error.message.includes("Invalid login") ? "Identifiants incorrects." : result.error.message, "error");
            else if (type === 'signup') showToast("Compte créé ! Vous pouvez vous connecter.", "success");
            else { showToast("Connexion réussie !", "success"); checkSession(); }
        }

        async function logOut() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            showToast("Déconnecté.", "success");
            checkSession();
        }

        // --- NAVIGATION ROUTER ---
        function switchView(viewName) {
            // Update Desktop Nav
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-white/10', 'text-white');
                btn.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`nav-${viewName}`);
            if(activeBtn) {
                activeBtn.classList.remove('text-gray-500');
                activeBtn.classList.add('bg-white/10', 'text-white');
            }

            // Update Mobile Nav
            document.querySelectorAll('.nav-btn-mobile').forEach(btn => {
                btn.classList.remove('text-pink-400');
                btn.classList.add('text-gray-500');
            });
            const activeMobileBtn = document.getElementById(`nav-mobile-${viewName}`);
            if(activeMobileBtn) {
                activeMobileBtn.classList.remove('text-gray-500');
                activeMobileBtn.classList.add('text-pink-400');
            }

            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';
            document.getElementById('main-content').scrollTop = 0;

            if(viewName === 'home') renderHome(mainContent);
            if(viewName === 'search') renderSearch(mainContent);
            if(viewName === 'community') renderCommunity(mainContent);
            if(viewName === 'album') renderAlbumView(mainContent);
            if(viewName === 'artist') renderArtistView(mainContent);
            if(viewName === 'profile') renderProfile(mainContent, currentUser.id);
        }

        // --- API HELPERS ---
        async function fetchWikiData(query) {
            try {
                let res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                if(res.ok) return await res.json();
                res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query + " (groupe)")}`);
                if(res.ok) return await res.json();
                res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query + " (album)")}`);
                if(res.ok) return await res.json();
                return null;
            } catch(e) { return null; }
        }

        window.searchAndGoToArtist = async function(artistName) {
            showToast("Recherche de l'artiste...", "success");
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artistName)}&entity=musicArtist&limit=1`);
                const data = await res.json();
                if(data.results.length > 0) {
                    currentArtistData = data.results[0];
                    switchView('artist');
                } else {
                    showToast("Artiste introuvable dans les archives.", "error");
                }
            } catch(e) { showToast("Erreur réseau.", "error"); }
        }

        window.loadExistingRatings = async function() {
            trackRatingsState = {};
            if(!currentUser || !currentAlbumData) return;
            try {
                const { data, error } = await supabaseClient
                    .from('album_ratings')
                    .select('track_ratings')
                    .eq('user_id', currentUser.id)
                    .eq('album_id', currentAlbumData.collectionId.toString())
                    .single();
                
                if (data && data.track_ratings) trackRatingsState = data.track_ratings;
            } catch(e) { } // Pas grave s'il n'y a pas de notes existantes
        }

        // --- VUES PRINCIPALES ---
        function renderHome(container) {
            container.innerHTML = `
                <div class="animate-fade-in space-y-8 md:space-y-12 pb-4">
                    <!-- Hero Section -->
                    <div class="relative w-full h-[400px] md:h-[500px] rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(236,72,153,0.15)] group border border-white/5">
                        <div class="absolute inset-0 bg-gradient-to-r from-gray-900 via-purple-900/80 to-pink-900/60 z-10"></div>
                        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=2074" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                        <div class="relative z-20 h-full flex flex-col justify-center p-6 md:p-16 max-w-4xl">
                            <span class="px-4 py-1.5 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-[10px] md:text-xs font-bold tracking-widest uppercase w-max mb-4 md:mb-6 text-pink-300">Bienvenue sur Lehfilium</span>
                            <h1 class="text-4xl md:text-6xl lg:text-7xl font-black mb-4 md:mb-6 leading-tight drop-shadow-xl text-balance">
                                Archivez votre vie <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400">musicale.</span>
                            </h1>
                            <p class="text-base md:text-xl text-gray-300 mb-6 md:mb-8 max-w-2xl font-light">Lehfilium n'est pas qu'un outil de notation. C'est une encyclopédie vivante et sociale.</p>
                            <button onclick="switchView('search')" class="bg-white text-black px-6 md:px-8 py-3 md:py-4 rounded-xl font-black w-max hover:scale-105 transition-transform flex items-center gap-3 shadow-[0_0_30px_rgba(255,255,255,0.3)]">
                                <i class="ph-bold ph-magnifying-glass text-xl"></i> Découvrir
                            </button>
                        </div>
                    </div>

                    <!-- Features -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 animate-slide-up" style="animation-delay: 0.2s">
                        <div class="glass-panel p-6 md:p-8 rounded-3xl border-t border-l border-white/10 hover:-translate-y-2 transition-transform duration-300">
                            <div class="w-12 h-12 bg-purple-500/20 rounded-2xl flex items-center justify-center mb-4 border border-purple-500/30">
                                <i class="ph-fill ph-database text-2xl text-purple-400"></i>
                            </div>
                            <h3 class="text-lg md:text-xl font-bold mb-2">Base de données infinie</h3>
                            <p class="text-sm md:text-base text-gray-400 leading-relaxed">Découvrez l'histoire complète derrière chaque album, grâce aux API mondiales d'Apple et Wikipédia.</p>
                        </div>
                        <div class="glass-panel p-6 md:p-8 rounded-3xl border-t border-l border-white/10 hover:-translate-y-2 transition-transform duration-300">
                            <div class="w-12 h-12 bg-pink-500/20 rounded-2xl flex items-center justify-center mb-4 border border-pink-500/30">
                                <i class="ph-fill ph-sliders-horizontal text-2xl text-pink-400"></i>
                            </div>
                            <h3 class="text-lg md:text-xl font-bold mb-2">Précision Chirurgicale</h3>
                            <p class="text-sm md:text-base text-gray-400 leading-relaxed">Notez chaque chanson au dixième près (0.1). L'algorithme calculera la note globale avec rigueur.</p>
                        </div>
                        <div class="glass-panel p-6 md:p-8 rounded-3xl border-t border-l border-white/10 hover:-translate-y-2 transition-transform duration-300">
                            <div class="w-12 h-12 bg-blue-500/20 rounded-2xl flex items-center justify-center mb-4 border border-blue-500/30">
                                <i class="ph-fill ph-users-three text-2xl text-blue-400"></i>
                            </div>
                            <h3 class="text-lg md:text-xl font-bold mb-2">Social & Public</h3>
                            <p class="text-sm md:text-base text-gray-400 leading-relaxed">Partagez votre journal, suivez l'avis de vos amis, et comparez vos goûts musicaux avec le monde.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- RECHERCHE ---
        function renderSearch(container) {
            container.innerHTML = `
                <div class="animate-fade-in">
                    <form id="search-form" class="relative mb-6 max-w-4xl mx-auto">
                        <i class="ph ph-magnifying-glass absolute left-4 md:left-6 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl"></i>
                        <input id="search-input" type="text" value="${currentSearchQuery}" placeholder="Toxicity, Daft Punk..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 md:py-5 pl-12 md:pl-16 pr-24 md:pr-32 text-base md:text-lg text-white focus:border-pink-500 backdrop-blur-md transition-all shadow-xl">
                        <button type="submit" class="absolute right-2 top-2 bottom-2 bg-gradient-to-r from-pink-600 to-purple-600 text-white rounded-xl px-4 md:px-8 font-bold transition-transform hover:scale-105 text-sm md:text-base">Chercher</button>
                    </form>

                    <div class="flex flex-wrap justify-center gap-2 md:gap-3 mb-8 md:mb-10">
                        <button class="filter-btn px-4 md:px-6 py-1.5 md:py-2 rounded-full text-sm md:text-base font-medium transition-all ${currentSearchFilter === 'tous' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('tous')">Tous</button>
                        <button class="filter-btn px-4 md:px-6 py-1.5 md:py-2 rounded-full text-sm md:text-base font-medium transition-all ${currentSearchFilter === 'album' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('album')">Album</button>
                        <button class="filter-btn px-4 md:px-6 py-1.5 md:py-2 rounded-full text-sm md:text-base font-medium transition-all ${currentSearchFilter === 'ep' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('ep')">EP</button>
                        <button class="filter-btn px-4 md:px-6 py-1.5 md:py-2 rounded-full text-sm md:text-base font-medium transition-all ${currentSearchFilter === 'single' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('single')">Single</button>
                        <button class="filter-btn px-4 md:px-6 py-1.5 md:py-2 rounded-full text-sm md:text-base font-medium transition-all ${currentSearchFilter === 'artist' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('artist')">Artiste</button>
                    </div>

                    <div id="search-results" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6"></div>
                </div>
            `;

            if(currentSearchQuery) executeSearch(currentSearchQuery);

            document.getElementById('search-form').addEventListener('submit', (e) => {
                e.preventDefault();
                currentSearchQuery = document.getElementById('search-input').value;
                executeSearch(currentSearchQuery);
            });
        }

        window.setFilter = function(type) {
            currentSearchFilter = type;
            switchView('search'); 
        };

        async function executeSearch(query) {
            if(!query) return;
            const resultsContainer = document.getElementById('search-results');
            resultsContainer.innerHTML = `<div class="col-span-full text-center py-20"><i class="ph ph-spinner-gap animate-spin text-5xl text-pink-500"></i><p class="text-gray-400 mt-4 font-medium tracking-wide">Fouille des archives mondiales...</p></div>`;

            try {
                let results = [];
                // Pour maximiser les chances de trouver Toxicity ou des albums noyés, on monte la limite à 200
                if (currentSearchFilter === 'tous') {
                    const [resAlbums, resArtists] = await Promise.all([
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=200`),
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=musicArtist&limit=20`)
                    ]);
                    results = [...(await resArtists.json()).results, ...(await resAlbums.json()).results];
                } else if (currentSearchFilter === 'artist') {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=musicArtist&limit=50`);
                    results = (await res.json()).results;
                } else {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=200`);
                    results = (await res.json()).results;
                }
                
                resultsContainer.innerHTML = '';
                
                if(results.length === 0) {
                    resultsContainer.innerHTML = `<div class="col-span-full text-center py-10 bg-white/5 rounded-3xl border border-white/10"><i class="ph-fill ph-ghost text-6xl text-gray-600 mb-4"></i><p class="text-gray-400">Aucune archive trouvée pour "${query}".</p></div>`;
                    return;
                }

                let filtered = results.filter(item => {
                    if (item.wrapperType === 'artist') return currentSearchFilter === 'tous' || currentSearchFilter === 'artist';
                    
                    const artistLow = item.artistName.toLowerCase();
                    if(artistLow.includes('karaoke') || artistLow.includes('tribute') || artistLow.includes('lullaby')) return false;

                    if(currentSearchFilter === 'album') return item.trackCount > 6;
                    if(currentSearchFilter === 'ep') return item.trackCount >= 4 && item.trackCount <= 6;
                    if(currentSearchFilter === 'single') return item.trackCount <= 3;
                    return true;
                });

                filtered.sort((a, b) => {
                    const nameA = a.wrapperType === 'artist' ? a.artistName : a.collectionName;
                    const nameB = b.wrapperType === 'artist' ? b.artistName : b.collectionName;
                    
                    // Priorité absolue si le nom recherché est EXACTEMENT le nom de l'album (ex: Toxicity)
                    const aExact = nameA.toLowerCase() === query.toLowerCase() ? 1 : 0;
                    const bExact = nameB.toLowerCase() === query.toLowerCase() ? 1 : 0;
                    if (aExact !== bExact) return bExact - aExact;
                    
                    if (a.wrapperType === 'artist' && b.wrapperType !== 'artist') return -1;
                    if (a.wrapperType !== 'artist' && b.wrapperType === 'artist') return 1;
                    if (a.wrapperType !== 'artist' && b.wrapperType !== 'artist') return b.trackCount - a.trackCount;
                    return 0;
                });

                filtered.slice(0, 40).forEach(item => {
                    if (item.wrapperType === 'artist') renderSearchArtistCard(item, resultsContainer);
                    else renderSearchAlbumCard(item, resultsContainer);
                });
                
                if(filtered.length === 0) resultsContainer.innerHTML = `<p class="text-gray-400 col-span-full text-center py-10">Aucun résultat dans cette catégorie.</p>`;
                
            } catch(e) {
                resultsContainer.innerHTML = `<p class="text-red-400 col-span-full text-center">Erreur de connexion aux archives.</p>`;
            }
        }

                trackDiv.innerHTML = `
                    <div class="flex items-center gap-3 md:gap-4 xl:w-[35%]">
                        <span class="text-gray-500 font-black text-lg md:text-xl w-6 md:w-8 text-right group-hover:text-pink-500 transition-colors">${track.trackNumber}.</span>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-base md:text-lg leading-tight text-white group-hover:text-pink-300 transition-colors truncate">${track.trackName}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <p class="text-[10px] md:text-xs text-gray-500 flex items-center gap-1 font-bold bg-white/5 px-2 py-0.5 rounded-md"><i class="ph-bold ph-clock"></i> ${timeStr}</p>
                                ${explicitBadge}
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex-1 flex flex-col sm:flex-row gap-3 items-start sm:items-center w-full">
                        <div class="relative w-full flex-1">
                            <i class="ph-fill ph-quotes absolute left-3 top-3 md:top-4 text-gray-600 text-lg"></i>
                            <textarea 
                                id="note-${track.trackId}"
                                placeholder="Analyse détaillée..."
                                class="w-full bg-black/40 border border-white/5 rounded-xl py-3 pl-10 pr-3 text-[10px] md:text-sm text-gray-200 focus:border-purple-500 focus:bg-black/80 resize-none h-12 md:h-14 transition-all hover:border-white/20"
                                onchange="updateTrackState(${track.trackId}, 'note', this.value)"
                            >${existingData.note}</textarea>
                        </div>
                        
                        <div class="flex items-center gap-2 bg-black/60 px-3 py-1 md:py-2 rounded-xl border border-white/10 focus-within:border-pink-500 focus-within:bg-black transition-colors shrink-0 shadow-inner w-full sm:w-auto justify-center">
                            <i class="ph-fill ph-star text-yellow-500 text-base md:text-lg"></i>
                            <input 
                                id="score-${track.trackId}"
                                type="number" min="0" max="10" step="0.1" 
                                value="${existingData.score}"
                                oninput="updateTrackState(${track.trackId}, 'score', this.value)"
                                class="w-12 md:w-16 bg-transparent text-center text-xl md:text-3xl font-black text-white focus:outline-none placeholder-gray-700"
                                placeholder="-"
                            >
                        </div>
                    </div>
                `;
                container.appendChild(trackDiv);
            });
            updateGlobalAverageDisplay();
        }

        window.updateTrackState = function(trackId, field, value) {
            if(!trackRatingsState[trackId]) trackRatingsState[trackId] = { score: '', note: '' };
            trackRatingsState[trackId][field] = value;
            if(field === 'score') updateGlobalAverageDisplay();
        };

        function updateGlobalAverageDisplay() {
            const scores = Object.values(trackRatingsState).map(t => parseFloat(t.score)).filter(s => !isNaN(s) && s >= 0 && s <= 10);
            let avg = 0;
            if(scores.length > 0) avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
            
            const display = document.getElementById('global-score-display');
            display.innerText = avg;
            
            display.classList.remove('text-green-400', 'text-yellow-400', 'text-red-400', 'text-white');
            if (avg === 0) display.classList.add('text-white');
            else if (avg >= 8) display.classList.add('text-green-400');
            else if (avg >= 5) display.classList.add('text-yellow-400');
            else display.classList.add('text-red-400');
        }

        window.saveRatingsToDB = async function() {
            if(!currentUser) return showToast("Veuillez vous connecter.", "error");
            const globalAvg = parseFloat(document.getElementById('global-score-display').innerText);
            
            const payload = {
                user_id: currentUser.id,
                album_id: currentAlbumData.collectionId.toString(),
                album_title: currentAlbumData.collectionName,
                artist_name: currentAlbumData.artistName,
                cover_url: currentAlbumData.artworkUrl100,
                global_rating: globalAvg,
                track_ratings: trackRatingsState
            };

            const { data: existing } = await supabaseClient.from('album_ratings').select('id').eq('user_id', currentUser.id).eq('album_id', payload.album_id);

            let error;
            if (existing && existing.length > 0) error = (await supabaseClient.from('album_ratings').update(payload).eq('id', existing[0].id)).error;
            else error = (await supabaseClient.from('album_ratings').insert([payload])).error;

            if (error) showToast("Erreur BD. Vérifiez RLS.", "error");
            else showToast("Archive Lehfilium sauvegardée avec succès !", "success");
        };

        // --- VUE PROFIL ---
        async function renderProfile(container, targetUserId) {
            const isMyProfile = (targetUserId === currentUser.id);
            container.innerHTML = `<div class="text-center py-32"><div class="w-64 h-8 shimmer rounded-xl mx-auto mb-4"></div></div>`;

            const { data, error } = await supabaseClient.from('album_ratings').select('*').eq('user_id', targetUserId).order('created_at', { ascending: false });
            if(error) return container.innerHTML = `<div class="text-center py-20 text-red-500 glass-panel">Erreur profil.</div>`;

            const ratings = data || [];
            let albumsHTML = ratings.length === 0 ? 
                `<div class="col-span-full text-center py-20 glass-panel rounded-[2rem] border-dashed border-2 border-white/10"><i class="ph-fill ph-folder-open text-6xl text-gray-600 mb-4"></i><h3 class="text-xl md:text-2xl font-bold">Ce journal est vide</h3></div>` : '';

            ratings.forEach(rating => {
                albumsHTML += `
                    <div class="glass-panel p-4 rounded-2xl flex flex-col md:flex-row gap-4 md:gap-5 group hover:bg-white/5 transition-all shadow-lg border border-white/5">
                        <img src="${rating.cover_url}" class="w-full md:w-32 aspect-square rounded-xl object-cover shadow-xl group-hover:scale-[1.02] transition-transform">
                        <div class="flex flex-col justify-center flex-1 py-1">
                            <h3 class="font-bold text-lg leading-tight mb-1 text-white truncate">${rating.album_title}</h3>
                            <p class="text-xs text-gray-400 font-medium mb-3 truncate">${rating.artist_name}</p>
                            <div class="flex items-center justify-between mt-auto">
                                <div class="inline-flex items-center gap-1 bg-black/60 px-3 py-1.5 rounded-lg border border-white/10">
                                    <i class="ph-fill ph-star text-yellow-500 text-sm"></i>
                                    <span class="font-black text-base text-white">${rating.global_rating}</span>
                                </div>
                                <span class="text-[10px] text-gray-600 font-bold uppercase">${new Date(rating.created_at).toLocaleDateString('fr-FR')}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            const actionButtons = isMyProfile ? `
                <button onclick="shareProfile('${currentUser.id}')" class="bg-white text-black px-4 md:px-6 py-2.5 md:py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:scale-105 transition-transform text-xs md:text-sm w-full md:w-auto">
                    <i class="ph-bold ph-share-network"></i> Partager mon profil
                </button>
            ` : `
                <button onclick="simulateFollow()" id="follow-btn" class="bg-pink-600 hover:bg-pink-500 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-xs md:text-sm w-full md:w-auto">
                    <i class="ph-bold ph-user-plus"></i> S'abonner
                </button>
            `;

            const userNameDisplay = isMyProfile ? currentUser.email.split('@')[0] : "Membre Lehfilium";

            container.innerHTML = `
                <div class="animate-fade-in pb-12">
                    <div class="glass-panel rounded-[2rem] md:rounded-[3rem] p-6 md:p-12 mb-8 md:mb-12 flex flex-col md:flex-row items-center gap-6 md:gap-10 relative overflow-hidden shadow-2xl border-white/10">
                        <div class="w-24 h-24 md:w-40 md:h-40 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 p-1 md:p-1.5 flex items-center justify-center z-10 shrink-0">
                            <div class="w-full h-full bg-[#1a1a24] rounded-full flex items-center justify-center border-4 md:border-[6px] border-[#0a0a0f] overflow-hidden">
                                <i class="ph-fill ph-user text-5xl md:text-[80px] text-white/30"></i>
                            </div>
                        </div>
                        
                        <div class="flex-1 text-center md:text-left z-10 w-full">
                            <h1 class="text-3xl md:text-5xl font-black mb-1 md:mb-2 truncate">${userNameDisplay}</h1>
                            <p class="text-xs md:text-sm text-gray-400 font-medium mb-6 md:mb-8"><i class="ph-fill ph-identification-badge"></i> ID: ${targetUserId.split('-')[0]}...</p>
                            
                            <div class="flex flex-col md:flex-row items-center gap-4 w-full">
                                <div class="bg-black/50 border border-white/10 px-5 py-3 rounded-2xl flex items-center gap-4 justify-center w-full md:w-auto">
                                    <div class="text-center md:text-left"><span class="block text-xl md:text-2xl font-black text-pink-400">${ratings.length}</span><span class="text-[9px] md:text-[10px] text-gray-500 uppercase font-bold">Archives</span></div>
                                    <div class="w-px h-8 bg-white/10"></div>
                                    <div class="text-center md:text-left"><span id="followers-count" class="block text-xl md:text-2xl font-black text-purple-400">${isMyProfile ? "0" : "12"}</span><span class="text-[9px] md:text-[10px] text-gray-500 uppercase font-bold">Abonnés</span></div>
                                </div>
                                <div class="w-full md:w-auto">${actionButtons}</div>
                            </div>
                        </div>
                    </div>
                    
                    <h2 class="text-2xl md:text-3xl font-black mb-6 flex items-center gap-3"><i class="ph-fill ph-books text-purple-500"></i> ${isMyProfile ? "Mon Journal" : "Son Journal"}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6 pb-6">
                        ${albumsHTML}
                    </div>
                </div>
            `;
        }

        window.shareProfile = function(userId) {
            const url = window.location.origin + window.location.pathname + "?user=" + userId;
            navigator.clipboard.writeText(url).then(() => showToast("Lien du profil copié !", "success"));
        };

        window.simulateFollow = function() {
            const btn = document.getElementById('follow-btn');
            const count = document.getElementById('followers-count');
            if(btn.innerText.includes("S'abonner")) {
                btn.innerHTML = `<i class="ph-bold ph-check"></i> Abonné`;
                btn.classList.replace('bg-pink-600', 'bg-white/20');
                count.innerText = parseInt(count.innerText) + 1;
                showToast("Abonnement réussi !", "success");
            } else {
                btn.innerHTML = `<i class="ph-bold ph-user-plus"></i> S'abonner`;
                btn.classList.replace('bg-white/20', 'bg-pink-600');
                count.innerText = parseInt(count.innerText) - 1;
                showToast("Désabonnement réussi.", "success");
            }
        };

        window.onload = () => checkSession();
    </script>
</body>
</html>
