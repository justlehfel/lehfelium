<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lehfilium - L'Archive Musicale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0f; color: #ffffff; overflow-x: hidden; }
 
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
 
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-panel {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input:focus, textarea:focus { outline: none; }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
 
        /* Mobile nav label hide */
        @media (max-width: 767px) {
            .nav-label { display: none; }
            #app-screen { flex-direction: row; }
        }
    </style>
</head>
<body class="selection:bg-pink-500 selection:text-white relative">
 
    <div class="fixed inset-0 z-0 pointer-events-none opacity-40 overflow-hidden">
        <div class="absolute top-[0%] left-[-10%] w-[500px] h-[500px] rounded-full bg-purple-600/30 blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-pink-600/20 blur-[150px] animate-float" style="animation-delay: -3s;"></div>
        <div class="absolute top-[40%] left-[60%] w-[300px] h-[300px] rounded-full bg-blue-600/10 blur-[100px]" style="animation: pulse-slow 4s ease-in-out infinite;"></div>
    </div>
 
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-3 max-w-xs w-full"></div>
 
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl animate-fade-in border-t border-l border-white/20">
            <div class="w-16 h-16 bg-gradient-to-br from-pink-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(236,72,153,0.4)]">
                <i class="ph ph-vinyl-record text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-black text-center mb-2">Lehfilium</h1>
            <p class="text-center text-gray-400 mb-8 font-light">L'archive musicale universelle.</p>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email audiophile" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:border-pink-500 transition-all">
                <input id="auth-password" type="password" placeholder="Mot de passe" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:border-purple-500 transition-all">
                <button onclick="handleAuth('login')" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-2xl px-5 py-4 mt-4 transition-transform hover:scale-[1.02] shadow-lg flex items-center justify-center gap-2">
                    <i class="ph-bold ph-sign-in"></i> Se connecter
                </button>
                <button onclick="handleAuth('signup')" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold rounded-2xl px-5 py-4 transition-all">
                    Créer mon compte
                </button>
            </div>
        </div>
    </div>
 
    <!-- APP SCREEN -->
    <div id="app-screen" class="relative z-10 hidden flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <nav class="w-16 md:w-64 glass-panel border-r border-white/10 flex flex-col items-center md:items-start py-6 md:py-8 shrink-0 transition-all duration-300 overflow-y-auto">
            <div class="flex items-center gap-3 px-0 md:px-8 mb-8 md:mb-12 cursor-pointer justify-center md:justify-start" onclick="switchView('home')">
                <div class="w-9 h-9 md:w-10 md:h-10 rounded-xl bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center shrink-0">
                    <i class="ph-fill ph-vinyl-record text-white text-lg md:text-xl"></i>
                </div>
                <span class="text-xl font-black hidden md:block bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 tracking-tight">Lehfilium</span>
            </div>
 
            <div class="flex-1 w-full px-2 md:px-4 space-y-1 md:space-y-2">
                <button onclick="switchView('home')" id="nav-home" class="nav-btn w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl transition-all duration-300 bg-white/10 text-white">
                    <i class="ph ph-house text-xl md:text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Accueil</span>
                </button>
                <button onclick="switchView('search')" id="nav-search" class="nav-btn w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5">
                    <i class="ph ph-magnifying-glass text-xl md:text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Recherche</span>
                </button>
                <button onclick="switchView('community')" id="nav-community" class="nav-btn w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5">
                    <i class="ph ph-users-three text-xl md:text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Communauté</span>
                </button>
                <button onclick="switchView('profile')" id="nav-profile" class="nav-btn w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5">
                    <i class="ph ph-user text-xl md:text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Mon Profil</span>
                </button>
            </div>
 
            <div class="w-full px-2 md:px-4 mt-auto pt-4">
                <button onclick="logOut()" class="w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl text-gray-500 hover:text-red-400 hover:bg-red-500/10 transition-all">
                    <i class="ph ph-sign-out text-xl md:text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Déconnexion</span>
                </button>
            </div>
        </nav>
 
        <main class="flex-1 overflow-y-auto hide-scrollbar p-3 md:p-10" id="main-content"></main>
    </div>
 
    <script>
    (function() {
        const { createClient } = window.supabase;
        const SUPABASE_URL = 'https://ydzgypqykkwqqnqttaaj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlkemd5cHF5a2t3cXFucXR0YWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjM3NzcsImV4cCI6MjA5NjUzOTc3N30.ax7ZOCH9TffTXBwaR2Jd4gPH8c2rq5Do__gxsjylXOA';
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
 
        // Global State
        let currentUser = null;
        let currentAlbumData = null;
        let currentArtistData = null;
        let currentTracksData = [];
        let trackRatingsState = {};
        let currentSearchQuery = "";
        let currentSearchFilter = "tous";
 
        // ─── TOAST ───────────────────────────────────────────────────────────
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isError = type === 'error';
            toast.className = `glass-panel ${isError ? 'bg-red-500/20 border-red-500/50' : 'bg-green-500/20 border-green-500/50'} px-4 py-3 rounded-2xl flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 shadow-2xl`;
            toast.innerHTML = `<i class="ph-fill ${isError ? 'ph-warning-circle text-red-400' : 'ph-check-circle text-green-400'} text-xl shrink-0"></i><span class="font-medium text-white text-sm">${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => { requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0')); });
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }
        window.showToast = showToast;
 
        // ─── AUTH & ROUTING ──────────────────────────────────────────────────
        async function checkSession() {
            try {
                const { data: { user } } = await sb.auth.getUser();
                if (user) {
                    currentUser = user;
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('app-screen').classList.add('flex');
                    const urlParams = new URLSearchParams(window.location.search);
                    const sharedUserId = urlParams.get('user');
                    if (sharedUserId) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                        renderProfile(document.getElementById('main-content'), sharedUserId);
                    } else {
                        switchView('home');
                    }
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    document.getElementById('app-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('flex');
                }
            } catch(e) {
                console.error('Session check error:', e);
            }
        }
 
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return showToast("Veuillez remplir tous les champs.", "error");
            let result;
            if (type === 'login') result = await sb.auth.signInWithPassword({ email, password });
            if (type === 'signup') result = await sb.auth.signUp({ email, password });
            if (result.error) {
                showToast(result.error.message.includes("Invalid login") ? "Identifiants incorrects." : result.error.message, "error");
            } else if (type === 'signup') {
                showToast("Compte créé ! Vous pouvez vous connecter.", "success");
            } else {
                showToast("Connexion réussie !", "success");
                checkSession();
            }
        }
        window.handleAuth = handleAuth;
 
        async function logOut() {
            await sb.auth.signOut();
            currentUser = null;
            showToast("Déconnecté avec succès.", "success");
            checkSession();
        }
        window.logOut = logOut;
 
        function setActiveNav(viewName) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-white/10', 'text-white');
                btn.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`nav-${viewName}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-gray-500');
                activeBtn.classList.add('bg-white/10', 'text-white');
            }
        }
 
        function switchView(viewName) {
            setActiveNav(viewName);
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';
            mainContent.scrollTop = 0;
 
            if (viewName === 'home') renderHome(mainContent);
            else if (viewName === 'search') renderSearch(mainContent);
            else if (viewName === 'community') renderCommunity(mainContent);
            else if (viewName === 'album') renderAlbumView(mainContent);
            else if (viewName === 'artist') renderArtistView(mainContent);
            else if (viewName === 'profile') renderProfile(mainContent, currentUser.id);
        }
        window.switchView = switchView;
 
        // ─── ITUNES FETCH HELPER (with CORS proxy fallback) ──────────────────
        async function itunesFetch(url) {
            // Add callback param to force JSONP-like response, use cors mode
            const res = await fetch(url + (url.includes('?') ? '&' : '?') + '_cachebust=' + Date.now(), {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        }
 
        // ─── WIKIPEDIA ───────────────────────────────────────────────────────
        async function fetchWikiData(query) {
            try {
                const attempts = [
                    query,
                    query + ' (groupe)',
                    query + ' (album)',
                    query + ' (musicien)',
                    query + ' (band)'
                ];
                for (const attempt of attempts) {
                    const res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(attempt)}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.extract && data.extract.length > 50) return data;
                    }
                }
                // Try English Wikipedia as fallback
                const resEn = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                if (resEn.ok) {
                    const data = await resEn.json();
                    if (data.extract && data.extract.length > 50) {
                        data.extract = '[EN] ' + data.extract;
                        return data;
                    }
                }
                return null;
            } catch(e) { return null; }
        }
 
        // ─── HOME ─────────────────────────────────────────────────────────────
        function renderHome(container) {
            container.innerHTML = `
                <div class="animate-fade-in space-y-8 md:space-y-12 pb-12">
                    <!-- Hero Section -->
                    <div class="relative w-full rounded-2xl md:rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(236,72,153,0.15)] group" style="min-height:320px;">
                        <div class="absolute inset-0 bg-gradient-to-r from-gray-900 via-purple-900/80 to-pink-900/60 z-10"></div>
                        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=2074" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000" alt="">
                        <div class="relative z-20 flex flex-col justify-center p-6 md:p-16 max-w-4xl" style="min-height:320px;">
                            <span class="px-3 py-1 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-xs font-bold tracking-widest uppercase w-max mb-4 text-pink-300">Bienvenue sur Lehfilium</span>
                            <h1 class="text-3xl md:text-6xl lg:text-7xl font-black mb-4 leading-tight drop-shadow-xl">
                                Archivez votre vie<br>
                                <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400">musicale.</span>
                            </h1>
                            <p class="text-sm md:text-xl text-gray-300 mb-6 max-w-2xl font-light leading-relaxed">Lehfilium n'est pas qu'un outil de notation. C'est une encyclopédie vivante, sociale et complète qui vous permet de documenter, analyser et partager chaque vibration musicale.</p>
                            <button onclick="switchView('search')" class="bg-white text-black px-6 py-3 md:px-8 md:py-4 rounded-xl font-black w-max hover:scale-105 transition-transform flex items-center gap-3 shadow-[0_0_30px_rgba(255,255,255,0.3)] text-sm md:text-base">
                                <i class="ph-bold ph-magnifying-glass text-lg md:text-xl"></i> Commencer la recherche
                            </button>
                        </div>
                    </div>
 
                    <!-- Features -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-t border-l border-white/10 hover:-translate-y-1 md:hover:-translate-y-2 transition-transform duration-300">
                            <div class="w-12 h-12 md:w-14 md:h-14 bg-purple-500/20 rounded-2xl flex items-center justify-center mb-4 md:mb-6 border border-purple-500/30">
                                <i class="ph-fill ph-database text-2xl md:text-3xl text-purple-400"></i>
                            </div>
                            <h3 class="text-lg md:text-xl font-bold mb-2 md:mb-3">Base de données infinie</h3>
                            <p class="text-gray-400 leading-relaxed text-sm md:text-base">Connecté à de multiples sources mondiales (Apple, Wikipédia). Découvrez l'histoire complète derrière chaque album, les membres, et l'origine des œuvres.</p>
                        </div>
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-t border-l border-white/10 hover:-translate-y-1 md:hover:-translate-y-2 transition-transform duration-300">
                            <div class="w-12 h-12 md:w-14 md:h-14 bg-pink-500/20 rounded-2xl flex items-center justify-center mb-4 md:mb-6 border border-pink-500/30">
                                <i class="ph-fill ph-sliders-horizontal text-2xl md:text-3xl text-pink-400"></i>
                            </div>
                            <h3 class="text-lg md:text-xl font-bold mb-2 md:mb-3">Précision Chirurgicale</h3>
                            <p class="text-gray-400 leading-relaxed text-sm md:text-base">Notez chaque chanson individuellement au dixième près (0.1). L'algorithme Lehfilium calculera la note globale de l'album avec rigueur mathématique.</p>
                        </div>
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-t border-l border-white/10 hover:-translate-y-1 md:hover:-translate-y-2 transition-transform duration-300">
                            <div class="w-12 h-12 md:w-14 md:h-14 bg-blue-500/20 rounded-2xl flex items-center justify-center mb-4 md:mb-6 border border-blue-500/30">
                                <i class="ph-fill ph-users-three text-2xl md:text-3xl text-blue-400"></i>
                            </div>
                            <h3 class="text-lg md:text-xl font-bold mb-2 md:mb-3">Social & Public</h3>
                            <p class="text-gray-400 leading-relaxed text-sm md:text-base">Générez votre profil public instantanément. Partagez votre journal, suivez vos amis, et comparez vos goûts musicaux avec le monde entier.</p>
                        </div>
                    </div>
                </div>
            `;
        }
 
        // ─── SEARCH ───────────────────────────────────────────────────────────
        function renderSearch(container) {
            container.innerHTML = `
                <div class="animate-fade-in">
                    <form id="search-form" class="relative mb-4 max-w-4xl mx-auto">
                        <i class="ph ph-magnifying-glass absolute left-4 md:left-6 top-1/2 -translate-y-1/2 text-gray-400 text-lg md:text-xl z-10"></i>
                        <input id="search-input" type="text" value="${currentSearchQuery.replace(/"/g,'&quot;')}" placeholder="Toxicity, Daft Punk, Kendrick..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 md:py-5 pl-12 md:pl-16 pr-28 md:pr-36 text-base md:text-lg text-white focus:border-pink-500 backdrop-blur-md transition-all shadow-xl">
                        <button type="submit" class="absolute right-2 top-2 bottom-2 bg-gradient-to-r from-pink-600 to-purple-600 text-white rounded-xl px-4 md:px-8 font-bold transition-transform hover:scale-105 text-sm md:text-base">Rechercher</button>
                    </form>
 
                    <div class="flex flex-wrap justify-center gap-2 md:gap-3 mb-6 md:mb-10">
                        ${['tous','album','ep','single','artist'].map(f => `
                            <button class="filter-btn px-4 md:px-6 py-1.5 md:py-2 rounded-full font-medium transition-all text-sm md:text-base ${currentSearchFilter === f ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('${f}')">${f === 'tous' ? 'Tous' : f === 'artist' ? 'Artiste' : f.toUpperCase()}</button>
                        `).join('')}
                    </div>
 
                    <div id="search-results" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-6 pb-12"></div>
                </div>
            `;
 
            if (currentSearchQuery) executeSearch(currentSearchQuery);
 
            document.getElementById('search-form').addEventListener('submit', (e) => {
                e.preventDefault();
                currentSearchQuery = document.getElementById('search-input').value.trim();
                if (currentSearchQuery) executeSearch(currentSearchQuery);
            });
        }
 
        window.setFilter = function(type) {
            currentSearchFilter = type;
            switchView('search');
        };
 
        async function executeSearch(query) {
            if (!query) return;
            const resultsContainer = document.getElementById('search-results');
            if (!resultsContainer) return;
            resultsContainer.innerHTML = `<div class="col-span-full text-center py-16"><i class="ph ph-spinner-gap animate-spin text-4xl text-pink-500"></i><p class="text-gray-400 mt-4 font-medium">Interrogation des bases de données...</p></div>`;
 
            try {
                let results = [];
                const country = 'us';
 
                if (currentSearchFilter === 'tous') {
                    const [r1, r2] = await Promise.all([
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=100&country=${country}`).then(r => r.json()),
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=musicArtist&limit=20&country=${country}`).then(r => r.json())
                    ]);
                    results = [...r2.results, ...r1.results];
                } else if (currentSearchFilter === 'artist') {
                    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=musicArtist&limit=50&country=${country}`).then(r => r.json());
                    results = r.results;
                } else {
                    // Fetch more results to increase chance of finding the right album
                    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=200&country=${country}`).then(r => r.json());
                    results = r.results;
                }
 
                if (!resultsContainer) return;
                resultsContainer.innerHTML = '';
 
                if (!results || results.length === 0) {
                    resultsContainer.innerHTML = `<div class="col-span-full text-center py-16 glass-panel rounded-3xl border border-white/10"><i class="ph-fill ph-ghost text-5xl text-gray-600 mb-3"></i><p class="text-gray-400">Aucune archive trouvée pour "${query}".</p></div>`;
                    return;
                }
 
                // Filter
                let filtered = results.filter(item => {
                    if (item.wrapperType === 'artist') return currentSearchFilter === 'tous' || currentSearchFilter === 'artist';
                    if (!item.artistName) return false;
                    const artistLow = item.artistName.toLowerCase();
                    if (artistLow.includes('karaoke') || artistLow.includes('tribute') || artistLow.includes('lullaby')) return false;
                    const tc = item.trackCount || 0;
                    if (currentSearchFilter === 'album') return tc > 6;
                    if (currentSearchFilter === 'ep') return tc >= 3 && tc <= 6;
                    if (currentSearchFilter === 'single') return tc <= 3;
                    return true;
                });
 
                // Sort: exact matches first
                filtered.sort((a, b) => {
                    const nameA = (a.wrapperType === 'artist' ? a.artistName : a.collectionName) || '';
                    const nameB = (b.wrapperType === 'artist' ? b.artistName : b.collectionName) || '';
                    const qLow = query.toLowerCase();
                    const aExact = nameA.toLowerCase() === qLow ? 2 : nameA.toLowerCase().includes(qLow) ? 1 : 0;
                    const bExact = nameB.toLowerCase() === qLow ? 2 : nameB.toLowerCase().includes(qLow) ? 1 : 0;
                    if (aExact !== bExact) return bExact - aExact;
                    if (a.wrapperType === 'artist' && b.wrapperType !== 'artist') return -1;
                    if (a.wrapperType !== 'artist' && b.wrapperType === 'artist') return 1;
                    return (b.trackCount || 0) - (a.trackCount || 0);
                });
 
                filtered.slice(0, 50).forEach(item => {
                    if (item.wrapperType === 'artist') renderSearchArtistCard(item, resultsContainer);
                    else renderSearchAlbumCard(item, resultsContainer);
                });
 
                if (filtered.length === 0) {
                    resultsContainer.innerHTML = `<p class="text-gray-400 col-span-full text-center py-10">Aucun résultat dans cette catégorie pour "${query}".</p>`;
                }
            } catch(e) {
                console.error('Search error:', e);
                if (resultsContainer) resultsContainer.innerHTML = `<p class="text-red-400 col-span-full text-center py-10">Erreur de connexion aux archives. Réessayez.</p>`;
            }
        }

                    .limit(500);

                // We can't search by email directly (privacy), so show all users with counts

                const users = Object.values(userMap).filter(u =>
                    u.user_id.toLowerCase().startsWith(query.toLowerCase()) ||

            const spotifyLink = `https://open.spotify.com/search/${encodeURIComponent(currentArtistData.artistName)}`;
 
            container.innerHTML = `
                <div class="animate-fade-in pb-20">
                    <button onclick="switchView('search')" class="flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition-colors bg-white/5 px-4 py-2 rounded-full border border-white/10 w-max text-sm">
                        <i class="ph ph-arrow-left"></i> Retour
                    </button>
 
                    <div class="relative rounded-2xl md:rounded-[2.5rem] overflow-hidden mb-6 md:mb-8 border border-white/10 bg-black shadow-2xl">
                        <div id="artist-banner-bg" class="absolute inset-0 z-0">
                            <div class="w-full h-full bg-gradient-to-br from-gray-900 to-black"></div>
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] via-[#0a0a0f]/80 to-transparent z-0"></div>
 
                        <div class="relative z-10 p-6 md:p-16 flex flex-col md:flex-row items-center md:items-end gap-6 text-center md:text-left">
                            <div id="artist-pfp" class="w-28 h-28 md:w-56 md:h-56 rounded-full bg-white/5 border-4 border-white/10 overflow-hidden flex items-center justify-center shadow-[0_0_50px_rgba(255,255,255,0.1)] shrink-0 z-20">
                                <i class="ph-fill ph-microphone-stage text-5xl md:text-6xl text-gray-600"></i>
                            </div>
 
                            <div class="flex-1 z-20 min-w-0">
                                <span class="px-3 py-1.5 bg-white/10 backdrop-blur-md rounded-lg text-xs font-black uppercase tracking-widest text-white border border-white/10 mb-3 inline-block"><i class="ph-fill ph-star"></i> Entité Musicale</span>
                                <h1 class="text-3xl md:text-6xl lg:text-8xl font-black mb-2 drop-shadow-2xl tracking-tighter leading-tight">${currentArtistData.artistName}</h1>
                                <p class="text-base md:text-2xl text-pink-400 font-bold tracking-widest uppercase mb-5 drop-shadow-md">${currentArtistData.primaryGenreName || 'Musique'}</p>
                                <div class="flex flex-wrap justify-center md:justify-start gap-3">
                                    <a href="${currentArtistData.artistLinkUrl || '#'}" target="_blank" class="bg-black/50 hover:bg-black text-[#fa243c] border border-white/10 px-5 md:px-8 py-3 md:py-4 rounded-xl md:rounded-2xl font-black transition-all flex items-center gap-2 text-sm md:text-base">
                                        <i class="ph-fill ph-apple-logo text-xl md:text-2xl"></i> Apple Music
                                    </a>
                                    <a href="${spotifyLink}" target="_blank" class="bg-black/50 hover:bg-black text-[#1DB954] border border-white/10 px-5 md:px-8 py-3 md:py-4 rounded-xl md:rounded-2xl font-black transition-all flex items-center gap-2 text-sm md:text-base">
                                        <i class="ph-fill ph-spotify-logo text-xl md:text-2xl"></i> Spotify
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
 
                    <!-- Wiki -->
                    <div id="wiki-artist-info" class="glass-panel rounded-2xl md:rounded-[2rem] p-6 md:p-12 mb-8 border border-white/10 relative overflow-hidden min-h-[120px] flex items-center justify-center">
                        <div class="flex items-center gap-3 text-pink-400">
                            <i class="ph ph-spinner-gap animate-spin text-xl"></i>
                            <span class="font-medium">Consultation des archives encyclopédiques...</span>
                        </div>
                    </div>
 
                    <h2 class="text-2xl md:text-3xl font-black mb-6 flex items-center gap-3"><i class="ph-fill ph-disc text-purple-500"></i> Discographie</h2>
                    <div id="artist-albums-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-6"></div>
                </div>
            `;
 
            // Wiki (non-blocking)
            fetchWikiData(currentArtistData.artistName).then(wiki => {
                const el = document.getElementById('wiki-artist-info');
                if (!el) return;
                if (wiki && wiki.extract) {
                    el.classList.remove('flex', 'items-center', 'justify-center');
                    el.innerHTML = `
                        <h3 class="text-xs text-purple-400 uppercase font-bold tracking-widest mb-3 flex items-center gap-2"><i class="ph-fill ph-globe"></i> Biographie & Histoire (Wikipédia)</h3>
                        <p class="text-sm md:text-lg font-light leading-relaxed text-gray-200">${wiki.extract}</p>
                    `;
                } else {
                    el.innerHTML = `<p class="text-gray-500 italic text-sm">Biographie non disponible dans les archives.</p>`;
                }
            });
 
            // Albums
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${currentArtistData.artistId}&entity=album&limit=200&country=us`);
                const data = await res.json();
                const albumsContainer = document.getElementById('artist-albums-container');
                if (!albumsContainer) return;
                albumsContainer.innerHTML = '';
 
                const albums = (data.results || []).filter(item => item.wrapperType === 'collection');
                albums.sort((a, b) => new Date(b.releaseDate) - new Date(a.releaseDate));
 
                if (albums.length === 0) {
                    albumsContainer.innerHTML = `<p class="text-gray-400 col-span-full">Aucune œuvre trouvée.</p>`;
                } else {
                    albums.forEach(album => renderSearchAlbumCard(album, albumsContainer));
                    const topImg = albums[0].artworkUrl100.replace('100x100bb', '600x600bb');
                    const pfp = document.getElementById('artist-pfp');
                    if (pfp) pfp.innerHTML = `<img src="${topImg}" class="w-full h-full object-cover" alt="">`;
                    const banner = document.getElementById('artist-banner-bg');
                    if (banner) banner.innerHTML = `<img src="${topImg}" class="w-full h-full object-cover blur-[100px] opacity-40 scale-125" alt="">`;
                }
            } catch(e) {
                const el = document.getElementById('artist-albums-container');
                if (el) el.innerHTML = `<p class="text-red-500 col-span-full">Erreur réseau.</p>`;
            }
        }
 
        // ─── GO TO ARTIST FROM ALBUM (FIXED) ─────────────────────────────────
        window.goToArtistFromAlbum = async function() {
            if (!currentAlbumData) return;
            const artistId = currentAlbumData.artistId;
            if (artistId) {
                try {
                    const res = await fetch(`https://itunes.apple.com/lookup?id=${artistId}&country=us`);
                    const data = await res.json();
                    const artist = (data.results || []).find(r => r.wrapperType === 'artist');
                    if (artist) {
                        currentArtistData = artist;
                        switchView('artist');
                        return;
                    }
                } catch(e) {}
            }
            // Fallback: search by artist name
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(currentAlbumData.artistName)}&entity=musicArtist&limit=1&country=us`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    currentArtistData = data.results[0];
                    switchView('artist');
                } else {
                    showToast('Artiste introuvable dans les archives.', 'error');
                }
            } catch(e) {
                showToast('Erreur de connexion.', 'error');
            }
        };
 
        // Legacy function name (keep for compatibility)
        window.searchAndGoToArtist = async function(name) {
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=musicArtist&limit=1&country=us`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    currentArtistData = data.results[0];
                    switchView('artist');
                }
            } catch(e) { showToast('Erreur réseau.', 'error'); }
        };
 
        // ─── TRACKS & RATINGS ─────────────────────────────────────────────────
        async function loadExistingRatings() {
            if (!currentUser || !currentAlbumData) return;
            try {
                const { data } = await sb.from('album_ratings')
                    .select('track_ratings')
                    .eq('user_id', currentUser.id)
                    .eq('album_id', currentAlbumData.collectionId.toString())
                    .maybeSingle();
 
                if (data && data.track_ratings) {
                    trackRatingsState = data.track_ratings;
                } else {
                    trackRatingsState = {};
                }
            } catch(e) {
                trackRatingsState = {};
            }
        }
 
        function renderTracks() {
            const container = document.getElementById('tracklist-container');
            if (!container) return;
 
            let html = '<h2 class="text-xl md:text-2xl font-black mb-4 md:mb-6 mt-6 md:mt-8 flex items-center gap-2"><i class="ph-fill ph-list-numbers text-purple-500"></i> Pistes & Analyses</h2>';
 
            currentTracksData.forEach(track => {
                const ms = track.trackTimeMillis || 0;
                const minutes = Math.floor(ms / 60000);
                const seconds = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
                const timeStr = `${minutes}:${seconds}`;
                const existing = trackRatingsState[track.trackId] || { score: '', note: '' };
                const explicitBadge = track.trackExplicitness === 'explicit'
                    ? '<span class="px-1.5 py-0.5 rounded bg-gray-800 text-[10px] font-black text-red-400 border border-red-500/30">E</span>'
                    : '';
                const scoreVal = existing.score !== '' ? existing.score : '';
                const noteVal = (existing.note || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
 
                html += `
                    <div class="glass-panel p-4 md:p-5 rounded-2xl md:rounded-3xl flex flex-col xl:flex-row gap-4 md:gap-6 border-l-4 border-l-transparent focus-within:border-l-pink-500 hover:bg-white/[0.02] transition-all group mb-3">
                        <div class="flex items-center gap-3 xl:w-[35%] min-w-0">
                            <span class="text-gray-500 font-black text-lg md:text-xl w-7 text-right group-hover:text-pink-500 transition-colors shrink-0">${track.trackNumber}.</span>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-base md:text-lg leading-tight text-white group-hover:text-pink-300 transition-colors truncate">${track.trackName || ''}</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <p class="text-xs text-gray-500 flex items-center gap-1 font-bold bg-white/5 px-2 py-0.5 rounded-md"><i class="ph-bold ph-clock"></i> ${timeStr}</p>
                                    ${explicitBadge}
                                </div>
                            </div>
                        </div>
 
                        <div class="flex-1 flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                            <div class="relative w-full flex-1">
                                <i class="ph-fill ph-quotes absolute left-3 md:left-4 top-3 md:top-4 text-gray-600 text-lg z-10"></i>
                                <textarea
                                    placeholder="Votre analyse de cette piste..."
                                    class="w-full bg-black/40 border border-white/5 rounded-xl md:rounded-2xl py-3 md:py-4 pl-10 md:pl-12 pr-3 md:pr-4 text-sm text-gray-200 focus:border-purple-500 focus:bg-black/80 resize-none h-12 md:h-14 transition-all hover:border-white/20"
                                    onchange="updateTrackState(${track.trackId}, 'note', this.value)"
                                >${noteVal}</textarea>
                            </div>
 
                            <div class="flex items-center gap-2 bg-black/60 px-3 md:px-4 py-2 rounded-xl md:rounded-2xl border border-white/10 focus-within:border-pink-500 transition-colors shrink-0 shadow-inner">
                                <i class="ph-fill ph-star text-yellow-500 text-base md:text-lg"></i>
                                <input
                                    type="number" min="0" max="10" step="0.1"
                                    value="${scoreVal}"
                                    oninput="updateTrackState(${track.trackId}, 'score', this.value)"
                                    class="w-14 md:w-16 bg-transparent text-center text-xl md:text-2xl font-black text-white focus:outline-none placeholder-gray-700"
                                    placeholder="—"
                                >
                            </div>
                        </div>
                    </div>
                `;
            });
 
            container.innerHTML = html;
            updateGlobalAverageDisplay();
        }
 
        window.updateTrackState = function(trackId, field, value) {
            if (!trackRatingsState[trackId]) trackRatingsState[trackId] = { score: '', note: '' };
            trackRatingsState[trackId][field] = value;
            if (field === 'score') updateGlobalAverageDisplay();
        };
 
        function updateGlobalAverageDisplay() {
            const scores = Object.values(trackRatingsState)
                .map(t => parseFloat(t.score))
                .filter(s => !isNaN(s) && s >= 0 && s <= 10);
 
            const display = document.getElementById('global-score-display');
            if (!display) return;
 
            if (scores.length === 0) {
                display.textContent = '—';
                display.className = 'text-5xl md:text-7xl font-black text-white transition-colors duration-500';
                return;
            }
 
            const avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
            display.textContent = avg;
            display.className = 'text-5xl md:text-7xl font-black transition-colors duration-500 ' + (
                avg >= 8 ? 'text-green-400' : avg >= 5 ? 'text-yellow-400' : 'text-red-400'
            );
        }
 
        window.saveRatingsToDB = async function() {
            if (!currentUser) return showToast("Veuillez vous connecter.", "error");
            if (!currentAlbumData) return;
 
            const display = document.getElementById('global-score-display');
            const rawVal = display ? display.textContent : '0';
            const globalAvg = rawVal === '—' ? 0 : parseFloat(rawVal);
 
            const payload = {
                user_id: currentUser.id,
                album_id: currentAlbumData.collectionId.toString(),
                album_title: currentAlbumData.collectionName,
                artist_name: currentAlbumData.artistName,
                cover_url: currentAlbumData.artworkUrl100,
                global_rating: isNaN(globalAvg) ? 0 : globalAvg,
                track_ratings: trackRatingsState
            };
 
            try {
                const { data: existing } = await sb.from('album_ratings').select('id')
                    .eq('user_id', currentUser.id)
                    .eq('album_id', payload.album_id);
 
                let error;
                if (existing && existing.length > 0) {
                    const result = await sb.from('album_ratings').update(payload).eq('id', existing[0].id);
                    error = result.error;
                } else {
                    const result = await sb.from('album_ratings').insert([payload]);
                    error = result.error;
                }
 
                if (error) {
                    console.error('Save error:', error);
                    showToast("Erreur de sauvegarde: " + error.message, "error");
                } else {
                    showToast("Archive sauvegardée avec succès !", "success");
                }
            } catch(e) {
                showToast("Erreur inattendue. Réessayez.", "error");
            }
        };
 
        // ─── PROFILE ──────────────────────────────────────────────────────────
        async function renderProfile(container, targetUserId) {
            const isMyProfile = currentUser && (targetUserId === currentUser.id);
 
            container.innerHTML = `
                <div class="text-center py-20">
                    <i class="ph ph-spinner-gap animate-spin text-4xl text-pink-500"></i>
                    <p class="text-gray-400 mt-4">Chargement du profil...</p>
                </div>
            `;
 
            try {
                const { data, error } = await sb.from('album_ratings').select('*')
                    .eq('user_id', targetUserId)
                    .order('created_at', { ascending: false });
 
                if (error) throw error;
 
                const ratings = data || [];
 
                let albumsHTML = ratings.length === 0 ? `
                    <div class="col-span-full text-center py-16 glass-panel rounded-[2rem] border-2 border-dashed border-white/10">
                        <i class="ph-fill ph-folder-open text-5xl text-gray-600 mb-3"></i>
                        <h3 class="text-xl font-bold mb-2">Ce journal Lehfilium est vide</h3>
                        <p class="text-gray-500 text-sm">Cherchez un album et gravez votre première archive.</p>
                    </div>
                ` : '';
 
                ratings.forEach(rating => {
                    albumsHTML += `
                        <div class="glass-panel p-3 md:p-4 rounded-2xl md:rounded-3xl flex flex-col md:flex-row gap-3 md:gap-5 group hover:bg-white/5 transition-all shadow-lg border border-white/5 hover:border-white/20 cursor-pointer" onclick="openRatedAlbum(${JSON.stringify(rating).replace(/"/g, '&quot;')})">
                            <img src="${rating.cover_url}" class="w-full md:w-32 aspect-square md:aspect-auto md:h-32 rounded-xl object-cover shadow-xl group-hover:scale-[1.02] transition-transform flex-shrink-0">
                            <div class="flex flex-col justify-center flex-1 min-w-0">
                                <h3 class="font-bold text-base md:text-xl leading-tight mb-0.5 text-white group-hover:text-pink-300 transition-colors truncate">${rating.album_title}</h3>
                                <p class="text-xs md:text-sm text-gray-400 font-medium mb-3 truncate">${rating.artist_name}</p>
                                <div class="flex items-center justify-between gap-2 mt-auto flex-wrap">
                                    <div class="inline-flex items-center gap-1.5 bg-black/60 px-3 py-1.5 rounded-xl border border-white/10">
                                        <i class="ph-fill ph-star text-yellow-500 text-sm"></i>
                                        <span class="font-black text-lg text-white">${rating.global_rating}</span>
                                    </div>
                                    <span class="text-xs text-gray-600 font-bold">${new Date(rating.created_at).toLocaleDateString('fr-FR')}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
 
                const actionButtons = isMyProfile ? `
                    <button onclick="shareProfile('${currentUser.id}')" class="bg-white text-black px-4 md:px-6 py-2 md:py-3 rounded-xl font-bold flex items-center gap-2 hover:scale-105 transition-transform text-sm md:text-base">
                        <i class="ph-bold ph-share-network"></i> Partager
                    </button>
                ` : `
                    <button onclick="window.simulateFollow()" id="follow-btn" class="bg-pink-600 hover:bg-pink-500 text-white px-6 md:px-8 py-2 md:py-3 rounded-xl font-bold flex items-center gap-2 transition-all text-sm md:text-base">
                        <i class="ph-bold ph-user-plus"></i> S'abonner
                    </button>
                `;
 
                const userNameDisplay = isMyProfile
                    ? (currentUser.email.split('@')[0])
                    : 'Membre Lehfilium';
 
                container.innerHTML = `
                    <div class="animate-fade-in max-w-6xl mx-auto pb-12">
                        <div class="glass-panel rounded-2xl md:rounded-[3rem] p-6 md:p-14 mb-8 md:mb-12 flex flex-col md:flex-row items-center gap-6 md:gap-10 relative overflow-hidden shadow-2xl border-white/10">
                            <div class="absolute right-0 top-0 w-64 md:w-96 h-64 md:h-96 bg-gradient-to-bl from-pink-500/20 to-purple-600/10 blur-[80px] rounded-full pointer-events-none"></div>
 
                            <div class="w-24 h-24 md:w-40 md:h-40 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 p-1 flex items-center justify-center shadow-[0_0_50px_rgba(236,72,153,0.3)] shrink-0 relative z-10">
                                <div class="w-full h-full bg-[#1a1a24] rounded-full flex items-center justify-center border-4 border-[#0a0a0f]">
                                    <i class="ph-fill ph-user text-4xl md:text-6xl text-white/30"></i>
                                </div>
                            </div>
 
                            <div class="flex-1 text-center md:text-left z-10 w-full min-w-0">
                                <span class="px-3 py-1 bg-white/10 rounded-full text-xs font-black tracking-widest uppercase mb-3 inline-block text-pink-300 border border-white/5">${isMyProfile ? "Mon Espace" : "Profil Public"}</span>
                                <h1 class="text-3xl md:text-5xl font-black mb-1 tracking-tight truncate">${userNameDisplay}</h1>
                                <p class="text-gray-400 font-medium mb-5 flex items-center justify-center md:justify-start gap-2 text-sm">
                                    <i class="ph-fill ph-identification-badge text-gray-500 text-lg"></i> ID: ${targetUserId.split('-')[0]}...
                                </p>
 
                                <div class="flex flex-wrap items-center justify-center md:justify-start gap-3">
                                    <div class="bg-black/50 border border-white/10 px-4 md:px-6 py-2 md:py-3 rounded-2xl flex items-center gap-3">
                                        <div class="text-left">
                                            <span class="block text-xl md:text-2xl font-black text-pink-400 leading-none">${ratings.length}</span>
                                            <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Archives</span>
                                        </div>
                                        <div class="w-px h-6 bg-white/10"></div>
                                        <div class="text-left">
                                            <span id="followers-count" class="block text-xl md:text-2xl font-black text-purple-400 leading-none">${isMyProfile ? "0" : "12"}</span>
                                            <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Abonnés</span>
                                        </div>
                                    </div>
                                    ${actionButtons}
                                </div>
                            </div>
                        </div>
 
                        <div class="flex items-center justify-between mb-6 md:mb-8 border-b border-white/10 pb-4">
                            <h2 class="text-2xl md:text-3xl font-black flex items-center gap-3">
                                <i class="ph-fill ph-books text-purple-500"></i>
                                ${isMyProfile ? "Mon Journal" : "Son Journal"}
                            </h2>
                            <span class="text-gray-500 text-sm">${ratings.length} archive${ratings.length !== 1 ? 's' : ''}</span>
                        </div>
 
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6">
                            ${albumsHTML}
                        </div>
                    </div>
                `;
            } catch(e) {
                console.error('Profile error:', e);
                container.innerHTML = `<div class="text-center py-20 text-red-500 glass-panel rounded-2xl p-8">Erreur de chargement du profil.</div>`;
            }
        }
 
        // Click on rated album to open it
        window.openRatedAlbum = function(rating) {
            // We need to reconstruct album data for the view
            currentAlbumData = {
                collectionId: parseInt(rating.album_id) || rating.album_id,
                collectionName: rating.album_title,
                artistName: rating.artist_name,
                artworkUrl100: rating.cover_url,
                trackCount: 10, // placeholder
                primaryGenreName: '',
                releaseDate: rating.created_at,
                collectionViewUrl: '#'
            };
            currentTracksData = [];
            trackRatingsState = rating.track_ratings || {};
            switchView('album');
        };
 
        window.shareProfile = function(userId) {
            const url = window.location.origin + window.location.pathname + '?user=' + userId;
            navigator.clipboard.writeText(url).then(() => {
                showToast("Lien du profil copié !", "success");
            }).catch(() => {
                showToast("Lien : " + url, "success");
            });
        };
 
        window.simulateFollow = function() {
            const btn = document.getElementById('follow-btn');
            const count = document.getElementById('followers-count');
            if (!btn || !count) return;
            if (btn.textContent.includes("S'abonner")) {
                btn.innerHTML = `<i class="ph-bold ph-check"></i> Abonné`;
                btn.classList.replace('bg-pink-600', 'bg-white/20');
                count.textContent = parseInt(count.textContent) + 1;
                showToast("Abonné à ce profil !", "success");
            } else {
                btn.innerHTML = `<i class="ph-bold ph-user-plus"></i> S'abonner`;
                btn.classList.replace('bg-white/20', 'bg-pink-600');
                count.textContent = parseInt(count.textContent) - 1;
                showToast("Désabonnement effectué.", "success");
            }
        };
 
        // ─── INIT ─────────────────────────────────────────────────────────────
        window.addEventListener('load', checkSession);
    })();
    </script>
</body>
</html>
