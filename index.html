<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lehfilium - L'Archive Musicale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0f; color: #ffffff; overflow-x: hidden; }
 
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-spin-slow { animation: spin-slow 12s linear infinite; }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
 
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .glass-panel {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .idle-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(236,72,153,0.3); }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input:focus, textarea:focus { outline: none; }
        
        /* Mobile nav styling */
        @media (max-width: 767px) {
            .nav-label { display: none; }
            #app-screen { flex-direction: column; }
            nav { flex-direction: row !important; width: 100% !important; height: auto !important; padding: 10px !important; border-right: none !important; border-top: 1px solid rgba(255,255,255,0.1); order: 2; z-index: 50; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); }
            .nav-btn { justify-content: center !important; padding: 10px !important; }
            .nav-container { flex-direction: row !important; width: 100%; justify-content: space-around; }
            #main-content { order: 1; height: calc(100vh - 70px); }
            .hide-on-mobile { display: none !important; }
        }
    </style>
</head>
<body class="selection:bg-pink-500 selection:text-white relative">
 
    <div class="fixed inset-0 z-0 pointer-events-none opacity-40 overflow-hidden">
        <div class="absolute top-[0%] left-[-10%] w-[500px] h-[500px] rounded-full bg-purple-600/30 blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-pink-600/20 blur-[150px] animate-float" style="animation-delay: -3s;"></div>
        <div class="absolute top-[40%] left-[60%] w-[300px] h-[300px] rounded-full bg-blue-600/10 blur-[100px]" style="animation: pulse-slow 6s ease-in-out infinite;"></div>
    </div>
 
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-3 max-w-xs w-full"></div>
 
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl animate-fade-in border-t border-l border-white/20">
            <div class="w-20 h-20 bg-gradient-to-br from-pink-500 to-purple-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_40px_rgba(236,72,153,0.5)] animate-spin-slow">
                <i class="ph ph-vinyl-record text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-black text-center mb-2 tracking-tight">Lehfilium</h1>
            <p class="text-center text-gray-400 mb-8 font-light">L'archive musicale universelle.</p>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email audiophile" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:border-pink-500 transition-all">
                <input id="auth-password" type="password" placeholder="Mot de passe" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:border-purple-500 transition-all">
                <button onclick="handleAuth('login')" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-2xl px-5 py-4 mt-4 transition-transform hover:scale-[1.02] shadow-lg flex items-center justify-center gap-2">
                    <i class="ph-bold ph-sign-in"></i> Se connecter
                </button>
                <button onclick="handleAuth('signup')" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold rounded-2xl px-5 py-4 transition-all">
                    Créer mon compte
                </button>

    </div>
 
    <!-- APP SCREEN -->
    <div id="app-screen" class="relative z-10 hidden flex h-screen overflow-hidden">
        <!-- Sidebar / Bottom Nav -->
        <nav class="w-16 md:w-64 glass-panel border-r border-white/10 flex flex-col items-center md:items-start py-6 md:py-8 shrink-0 transition-all duration-300">
            <div class="flex items-center gap-3 px-0 md:px-8 mb-8 md:mb-12 cursor-pointer justify-center md:justify-start hide-on-mobile" onclick="switchView('home')">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center shrink-0 animate-spin-slow shadow-[0_0_15px_rgba(236,72,153,0.4)]">
                    <i class="ph-fill ph-vinyl-record text-white text-xl"></i>
                </div>
                <span class="text-xl font-black hidden md:block bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 tracking-tight">Lehfilium</span>
            </div>
 
            <div class="nav-container flex-1 w-full px-2 md:px-4 space-y-1 md:space-y-2 flex flex-col">
                <button onclick="switchView('home')" id="nav-home" class="nav-btn w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl transition-all duration-300 bg-white/10 text-white hover:-translate-y-1">
                    <i class="ph-fill ph-house text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Accueil</span>
                </button>
                <button onclick="switchView('search')" id="nav-search" class="nav-btn w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5 hover:-translate-y-1">
                    <i class="ph-fill ph-magnifying-glass text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Recherche</span>
                </button>
                <button onclick="switchView('community')" id="nav-community" class="nav-btn w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5 hover:-translate-y-1">
                    <i class="ph-fill ph-users-three text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Communauté</span>
                </button>
                <button onclick="switchView('games')" id="nav-games" class="nav-btn w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5 hover:-translate-y-1">
                    <i class="ph-fill ph-game-controller text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Mini-Jeux</span>
                </button>
                <button onclick="switchView('profile')" id="nav-profile" class="nav-btn w-full flex items-center gap-0 md:gap-4 justify-center md:justify-start px-2 md:px-4 py-3 rounded-2xl transition-all duration-300 text-gray-500 hover:text-white hover:bg-white/5 hover:-translate-y-1">
                    <i class="ph-fill ph-user-circle text-2xl"></i>
                    <span class="font-medium nav-label hidden md:block">Mon Profil</span>
                </button>
            </div>
        </nav>
 
        <main class="flex-1 overflow-y-auto hide-scrollbar p-4 md:p-10 relative" id="main-content"></main>
    </div>
 
    <script>
    (function() {
        const { createClient } = window.supabase;
        const SUPABASE_URL = 'https://ydzgypqykkwqqnqttaaj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlkemd5cHF5a2t3cXFucXR0YWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjM3NzcsImV4cCI6MjA5NjUzOTc3N30.ax7ZOCH9TffTXBwaR2Jd4gPH8c2rq5Do__gxsjylXOA';
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
 
        let currentUser = null;
        let userProfile = null;
        let currentAlbumData = null;
        let currentArtistData = null;
        let currentTracksData = [];
        let trackRatingsState = {};
        let currentSearchQuery = "";
        let currentSearchFilter = "tous";
 
        // ─── TOAST ───────────────────────────────────────────────────────────
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isError = type === 'error';
            toast.className = `glass-panel ${isError ? 'bg-red-500/20 border-red-500/50' : 'bg-green-500/20 border-green-500/50'} px-5 py-4 rounded-2xl flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 shadow-2xl`;
            toast.innerHTML = `<i class="ph-fill ${isError ? 'ph-warning-circle text-red-400' : 'ph-check-circle text-green-400'} text-xl shrink-0 animate-pulse"></i><span class="font-bold text-white text-sm">${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => { requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0')); });
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }
        window.showToast = showToast;
 
        // ─── AUTH & PROFILES ─────────────────────────────────────────────────
        async function loadUserProfile(userId) {
            try {
                const { data, error } = await sb.from('profiles').select('*').eq('id', userId).maybeSingle();
                if (data) return data;
                // Auto-create if missing for current user
                if (userId === currentUser.id) {
                    const newProf = { id: userId, display_name: currentUser.email.split('@')[0], avatar_url: '' };
                    await sb.from('profiles').insert([newProf]);
                    return newProf;
                }
            } catch(e) { console.error('Profile load error', e); }
            return { display_name: 'Membre Lehfilium', avatar_url: '' };
        }

        async function checkSession() {
            try {
                const { data: { user } } = await sb.auth.getUser();
                if (user) {
                    currentUser = user;
                    userProfile = await loadUserProfile(user.id);
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('app-screen').classList.add('flex');
                    const urlParams = new URLSearchParams(window.location.search);
                    const sharedUserId = urlParams.get('user');
                    if (sharedUserId) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                        renderProfile(document.getElementById('main-content'), sharedUserId);
                    } else {
                        switchView('home');
                    }
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    document.getElementById('app-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('flex');
                }
            } catch(e) {}
        }
 
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return showToast("Veuillez remplir tous les champs.", "error");
            let result;
            if (type === 'login') result = await sb.auth.signInWithPassword({ email, password });
            if (type === 'signup') result = await sb.auth.signUp({ email, password });
            if (result.error) showToast(result.error.message.includes("Invalid login") ? "Identifiants incorrects." : result.error.message, "error");
            else if (type === 'signup') showToast("Compte créé ! Vous pouvez vous connecter.", "success");
            else { showToast("Connexion réussie !", "success"); checkSession(); }
        }
        window.handleAuth = handleAuth;
 
        async function logOut() { await sb.auth.signOut(); currentUser = null; showToast("Déconnecté.", "success"); checkSession(); }
        window.logOut = logOut;
 
        function setActiveNav(viewName) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-white/10', 'text-white');
                btn.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`nav-${viewName}`);
            if (activeBtn) { activeBtn.classList.remove('text-gray-500'); activeBtn.classList.add('bg-white/10', 'text-white'); }
        }
 
        function switchView(viewName) {
            setActiveNav(viewName);
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = ''; mainContent.scrollTop = 0;
            if (viewName === 'home') renderHome(mainContent);
            else if (viewName === 'search') renderSearch(mainContent);
            else if (viewName === 'community') renderCommunity(mainContent);
            else if (viewName === 'games') renderGames(mainContent);
            else if (viewName === 'settings') renderSettings(mainContent);
            else if (viewName === 'album') renderAlbumView(mainContent);
            else if (viewName === 'artist') renderArtistView(mainContent);
            else if (viewName === 'profile') renderProfile(mainContent, currentUser.id);
        }
        window.switchView = switchView;
 
        async function fetchWikiData(query) {
            try {
                const attempts = [query, query + ' (groupe)', query + ' (album)'];
                for (const attempt of attempts) {
                    const res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(attempt)}`);
                    if (res.ok) { const data = await res.json(); if (data.extract) return data; }
                }
                return null;
            } catch(e) { return null; }
        }
 
        // ─── HOME ─────────────────────────────────────────────────────────────
        function renderHome(container) {
            container.innerHTML = `
                <div class="animate-fade-in space-y-8 pb-12">
                    <div class="relative w-full rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(236,72,153,0.15)] group" style="min-height:350px;">
                        <div class="absolute inset-0 bg-gradient-to-r from-gray-900 via-purple-900/80 to-pink-900/60 z-10"></div>
                        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=2074" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-[20s]" alt="">
                        <div class="relative z-20 flex flex-col justify-center p-8 md:p-16 max-w-4xl h-full">
                            <span class="px-4 py-1.5 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-xs font-black tracking-widest uppercase w-max mb-6 text-pink-300 animate-pulse">Lehfilium V5</span>
                            <h1 class="text-4xl md:text-7xl font-black mb-4 leading-tight drop-shadow-xl">
                                Archivez votre vie<br>
                                <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400">musicale.</span>
                            </h1>
                            <p class="text-base md:text-xl text-gray-300 mb-8 max-w-2xl font-light leading-relaxed">Une encyclopédie vivante, sociale et absolue. Documentez, analysez et partagez chaque vibration.</p>
                            <button onclick="switchView('search')" class="bg-white text-black px-8 py-4 rounded-2xl font-black w-max hover:scale-105 transition-transform flex items-center gap-3 shadow-[0_0_30px_rgba(255,255,255,0.3)]">
                                <i class="ph-bold ph-magnifying-glass text-xl"></i> Explorer les archives
                            </button>
                        </div>
                    </div>
 
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="glass-panel p-8 rounded-3xl border-t border-l border-white/10 idle-hover transition-all">
                            <div class="w-14 h-14 bg-purple-500/20 rounded-2xl flex items-center justify-center mb-6 border border-purple-500/30 shadow-[0_0_20px_rgba(168,85,247,0.3)]">
                                <i class="ph-fill ph-database text-3xl text-purple-400"></i>
                            </div>
                            <h3 class="text-xl font-bold mb-3">Recherche Intelligente</h3>
                            <p class="text-gray-400 text-sm leading-relaxed">Le nouvel algorithme Lehfilium trouve instantanément les œuvres originales, même les plus complexes, en triant par pertinence exacte.</p>
                        </div>
                        <div class="glass-panel p-8 rounded-3xl border-t border-l border-white/10 idle-hover transition-all">
                            <div class="w-14 h-14 bg-pink-500/20 rounded-2xl flex items-center justify-center mb-6 border border-pink-500/30 shadow-[0_0_20px_rgba(236,72,153,0.3)]">
                                <i class="ph-fill ph-game-controller text-3xl text-pink-400"></i>
                            </div>
                            <h3 class="text-xl font-bold mb-3">Mini-Jeux Musicaux</h3>
                            <p class="text-gray-400 text-sm leading-relaxed">Testez vos connaissances avec le nouveau jeu "Pochette Mystère". Devinez les artistes derrière les pochettes floutées !</p>
                        </div>
                        <div class="glass-panel p-8 rounded-3xl border-t border-l border-white/10 idle-hover transition-all">
                            <div class="w-14 h-14 bg-blue-500/20 rounded-2xl flex items-center justify-center mb-6 border border-blue-500/30 shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                                <i class="ph-fill ph-user-circle-gear text-3xl text-blue-400"></i>
                            </div>
                            <h3 class="text-xl font-bold mb-3">Profils Personnalisés</h3>
                            <p class="text-gray-400 text-sm leading-relaxed">Modifiez votre pseudo, ajoutez un avatar, et bâtissez un journal musical unique que vos amis peuvent suivre.</p>
                        </div>
                    </div>
                </div>
            `;
        }
 
        // ─── SEARCH (WITH TOXICITY FIX) ───────────────────────────────────────
        function renderSearch(container) {
            container.innerHTML = `
                <div class="animate-fade-in">
                    <form id="search-form" class="relative mb-6 max-w-4xl mx-auto group">
                        <i class="ph-bold ph-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 text-xl z-10 group-focus-within:text-pink-500 transition-colors"></i>
                        <input id="search-input" type="text" value="${currentSearchQuery.replace(/"/g,'&quot;')}" placeholder="Toxicity, Daft Punk, Kendrick..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 pl-16 pr-36 text-lg text-white focus:border-pink-500 backdrop-blur-md transition-all shadow-xl">
                        <button type="submit" class="absolute right-2 top-2 bottom-2 bg-gradient-to-r from-pink-600 to-purple-600 text-white rounded-xl px-8 font-bold transition-transform hover:scale-105">Rechercher</button>
                    </form>
 
                    <div class="flex flex-wrap justify-center gap-3 mb-10">
                        ${['tous','album','ep','single','artist'].map(f => `
                            <button class="filter-btn px-6 py-2 rounded-full font-bold transition-all text-sm ${currentSearchFilter === f ? 'bg-white text-black shadow-[0_0_15px_rgba(255,255,255,0.4)]' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('${f}')">${f === 'tous' ? 'Tous' : f === 'artist' ? 'Artiste' : f.toUpperCase()}</button>
                        `).join('')}
                    </div>
 
                    <div id="search-results" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6 pb-12"></div>
                </div>
            `;
 
            if (currentSearchQuery) executeSearch(currentSearchQuery);
            document.getElementById('search-form').addEventListener('submit', (e) => {
                e.preventDefault();
                currentSearchQuery = document.getElementById('search-input').value.trim();
                if (currentSearchQuery) executeSearch(currentSearchQuery);
            });
        }
 
        window.setFilter = function(type) { currentSearchFilter = type; switchView('search'); };
 
        async function executeSearch(query) {
            const resultsContainer = document.getElementById('search-results');
            if (!resultsContainer) return;
            resultsContainer.innerHTML = `<div class="col-span-full text-center py-20"><i class="ph-bold ph-vinyl-record animate-spin-slow text-6xl text-pink-500 drop-shadow-[0_0_15px_rgba(236,72,153,0.5)]"></i><p class="text-gray-400 mt-6 font-bold tracking-widest uppercase text-sm">Scan des archives mondiales...</p></div>`;
 
            try {
                let results = [];
                const country = 'us';
 
                if (currentSearchFilter === 'tous') {
                    const [r1, r2] = await Promise.all([
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=200&country=${country}`).then(r => r.json()),
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=musicArtist&limit=20&country=${country}`).then(r => r.json())
                    ]);
                    results = [...r2.results, ...r1.results];
                } else if (currentSearchFilter === 'artist') {
                    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=musicArtist&limit=50&country=${country}`).then(r => r.json());
                    results = r.results;
                } else {
                    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=200&country=${country}`).then(r => r.json());
                    results = r.results;
                }
 
                if (!resultsContainer) return;
                resultsContainer.innerHTML = '';
 
                // Filtrage
                let filtered = results.filter(item => {
                    if (item.wrapperType === 'artist') return currentSearchFilter === 'tous' || currentSearchFilter === 'artist';
                    if (!item.artistName) return false;
                    const artistLow = item.artistName.toLowerCase();
                    if (artistLow.includes('karaoke') || artistLow.includes('tribute') || artistLow.includes('lullaby')) return false;
                    const tc = item.trackCount || 0;
                    if (currentSearchFilter === 'album') return tc > 6;
                    if (currentSearchFilter === 'ep') return tc >= 3 && tc <= 6;
                    if (currentSearchFilter === 'single') return tc <= 3;
                    return true;
                });
 
                // Tri IA: Correspondance exacte + Popularité d'Apple (index)
                filtered.sort((a, b) => {
                    const nameA = (a.wrapperType === 'artist' ? a.artistName : a.collectionName) || '';
                    const nameB = (b.wrapperType === 'artist' ? b.artistName : b.collectionName) || '';
                    const qLow = query.toLowerCase();
 
                    let scoreA = 0; let scoreB = 0;
                    if (nameA.toLowerCase() === qLow) scoreA += 1000;
                    else if (nameA.toLowerCase().startsWith(qLow)) scoreA += 500;
                    else if (nameA.toLowerCase().includes(qLow)) scoreA += 100;
 
                    if (nameB.toLowerCase() === qLow) scoreB += 1000;
                    else if (nameB.toLowerCase().startsWith(qLow)) scoreB += 500;
                    else if (nameB.toLowerCase().includes(qLow)) scoreB += 100;
 
                    // Bonus pour les albums complets (ex: Toxicity original vs Single)
                    if (a.wrapperType !== 'artist' && a.trackCount > 6) scoreA += 50;
                    if (b.wrapperType !== 'artist' && b.trackCount > 6) scoreB += 50;

                    // Apple renvoie les plus populaires en premier, on utilise l'index comme tiebreaker
                    scoreA -= results.indexOf(a);
                    scoreB -= results.indexOf(b);

        window.handleGameAnswer = function(selected, correct, albumName) {
            const img = document.getElementById('game-img');
            const overlay = document.getElementById('game-overlay');
            const icon = document.getElementById('game-icon');
            const resultDiv = document.getElementById('game-result');
            const btns = document.querySelectorAll('.game-btn');
            
            // Reveal image
            img.classList.remove('blur-xl', 'scale-110');
            overlay.classList.remove('opacity-0');
            
            btns.forEach(btn => {
                btn.disabled = true;
                if(btn.innerText.trim() === correct) {
                    btn.classList.add('bg-green-600/50', 'border-green-500', 'text-white');
                    btn.classList.remove('glass-panel', 'hover:bg-white/10');
                } else if(btn.innerText.trim() === selected && selected !== correct) {
                    btn.classList.add('bg-red-600/50', 'border-red-500', 'text-white');
                    btn.classList.remove('glass-panel', 'hover:bg-white/10');
                }
            });

            if(selected === correct) {
                icon.classList.add('ph-check-circle', 'text-green-400');
                resultDiv.innerHTML = `<h3 class="text-2xl font-black text-green-400 mb-1 animate-slide-up">Excellent !</h3><p class="text-gray-300 animate-slide-up">C'était bien l'album <strong>${albumName}</strong>.</p><button onclick="startMysteryCover()" class="mt-6 bg-white text-black px-8 py-3 font-black rounded-full hover:scale-105 transition-transform">Rejouer</button>`;
            } else {
                icon.classList.add('ph-x-circle', 'text-red-400');
                resultDiv.innerHTML = `<h3 class="text-2xl font-black text-red-400 mb-1 animate-slide-up">Raté !</h3><p class="text-gray-300 animate-slide-up">C'était l'album <strong>${albumName}</strong> de ${correct}.</p><button onclick="startMysteryCover()" class="mt-6 bg-white/10 text-white px-8 py-3 font-black rounded-full hover:bg-white/20 transition-all">Réessayer</button>`;
            }
        };

        // ─── PROFILE / ALBUM VIEW (Rest of code) ───────────────────────────────
        async function renderAlbumView(container) {
            if (!currentAlbumData) return switchView('search');
            const releaseDate = currentAlbumData.releaseDate ? new Date(currentAlbumData.releaseDate) : null;
            const fullDate = releaseDate ? releaseDate.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
            const spotifyLink = `https://open.spotify.com/search/${encodeURIComponent((currentAlbumData.artistName || '') + ' ' + (currentAlbumData.collectionName || ''))}`;
            
            let bt = 'Album', bc = 'bg-purple-600';
            if (currentAlbumData.trackCount <= 3) { bt = 'Single'; bc = 'bg-blue-600'; } else if (currentAlbumData.trackCount <= 6) { bt = 'EP'; bc = 'bg-pink-600'; }

            container.innerHTML = `
                <div class="animate-fade-in pb-20">
                    <button onclick="switchView('search')" class="flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition-colors bg-white/5 px-4 py-2 rounded-full border border-white/10 w-max text-sm">
                        <i class="ph-bold ph-arrow-left"></i> Retour
                    </button>
                    <!-- HEADER ALBUM -->
                    <div class="relative rounded-2xl md:rounded-[2.5rem] overflow-hidden mb-6 md:mb-8 border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                        <div class="absolute inset-0 z-0">
                            <img src="${currentAlbumData.artworkUrl100}" class="w-full h-full object-cover blur-[80px] opacity-30 scale-125" alt="">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] via-[#0a0a0f]/60 to-transparent"></div>
                        </div>
                        <div class="relative z-10 p-5 md:p-12 flex flex-col md:flex-row gap-6 md:gap-10 items-start md:items-end">
                            <img src="${currentAlbumData.artworkUrl100}" class="w-36 h-36 md:w-72 md:h-72 rounded-xl md:rounded-2xl shadow-[0_30px_60px_rgba(0,0,0,0.8)] border border-white/20 object-cover shrink-0" alt="">
                            <div class="flex-1 w-full z-20 min-w-0">
                                <div class="flex flex-wrap items-center gap-2 mb-3">
                                    <span class="bg-white/10 backdrop-blur-md px-2.5 py-1 rounded-lg text-[10px] md:text-xs font-black uppercase tracking-widest text-white border border-white/10">${bt}</span>
                                    <span class="bg-pink-500/20 px-2.5 py-1 rounded-lg text-[10px] md:text-xs font-black uppercase tracking-widest text-pink-300 border border-pink-500/30">${currentAlbumData.primaryGenreName || ''}</span>
                                </div>
                                <h1 class="text-3xl md:text-5xl lg:text-6xl font-black mb-3 leading-tight drop-shadow-xl text-balance">${currentAlbumData.collectionName || ''}</h1>
                                <button onclick="goToArtistFromAlbum()" class="text-lg md:text-2xl text-gray-300 font-bold mb-5 flex items-center gap-3 hover:text-white transition-colors group">
                                    <span class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/20 group-hover:bg-white group-hover:text-black transition-all shrink-0"><i class="ph-fill ph-user text-sm md:text-lg"></i></span>
                                    <span class="truncate">${currentAlbumData.artistName || ''}</span>
                                </button>
                                <div class="glass-panel rounded-2xl md:rounded-3xl p-5 md:p-6 flex flex-col lg:flex-row items-start lg:items-center justify-between gap-5 border-white/5">
                                    <div class="flex flex-col">
                                        <p class="text-[10px] md:text-xs text-gray-500 mb-1 uppercase font-bold tracking-widest">Évaluation Lehfilium</p>
                                        <div class="flex items-baseline gap-1">
                                            <div id="global-score-display" class="text-5xl md:text-7xl font-black text-white transition-colors duration-500">—</div>
                                            <span class="text-xl md:text-2xl text-gray-600 font-bold">/10</span>
                                        </div>
                                    </div>
                                    <div id="aoty-scores" class="flex gap-3 w-full lg:w-auto">
                                        <div class="flex-1 bg-black/40 border border-white/10 rounded-xl px-3 py-2 text-center" title="Scores AOTY simulés">
                                            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Critic</p>
                                            <div class="text-xl md:text-2xl font-black text-yellow-400">88</div>
                                        </div>
                                        <div class="flex-1 bg-black/40 border border-white/10 rounded-xl px-3 py-2 text-center" title="Scores AOTY simulés">
                                            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">User</p>
                                            <div class="text-xl md:text-2xl font-black text-blue-400">85</div>
                                        </div>
                                    </div>
                                    <div class="flex flex-wrap gap-2 md:gap-3 w-full lg:w-auto">
                                        <button onclick="saveRatingsToDB()" class="flex-1 lg:flex-none bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white px-5 md:px-8 py-3 md:py-4 rounded-xl md:rounded-2xl font-black transition-transform hover:scale-105 flex items-center justify-center gap-2 shadow-[0_0_30px_rgba(236,72,153,0.3)] text-sm md:text-base">
                                            <i class="ph-bold ph-floppy-disk text-lg"></i> Graver l'archive
                                        </button>
                                        <a href="${currentAlbumData.collectionViewUrl || '#'}" target="_blank" class="bg-black/50 hover:bg-black text-[#fa243c] p-3 md:p-4 rounded-xl md:rounded-2xl transition-colors border border-white/10 flex items-center justify-center"><i class="ph-fill ph-apple-logo text-xl md:text-2xl"></i></a>
                                        <a href="${spotifyLink}" target="_blank" class="bg-black/50 hover:bg-black text-[#1DB954] p-3 md:p-4 rounded-xl md:rounded-2xl transition-colors border border-white/10 flex items-center justify-center"><i class="ph-fill ph-spotify-logo text-xl md:text-2xl"></i></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- COMPENDIUM -->
                    <div class="glass-panel rounded-2xl md:rounded-[2rem] p-6 md:p-8 mb-8 border-l-4 border-l-purple-500 relative overflow-hidden">
                        <h2 class="text-xl md:text-2xl font-black mb-4 md:mb-6 flex items-center gap-2"><i class="ph-fill ph-info text-purple-400"></i> Compendium Lehfilium</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 border-b border-white/10 pb-6">
                            <div>
                                <h3 class="text-xs text-gray-500 uppercase font-bold tracking-widest mb-2">Détails de l'Œuvre</h3>
                                <ul class="space-y-2 text-gray-300 text-sm md:text-base">
                                    <li class="flex items-center gap-2"><i class="ph-fill ph-calendar text-gray-500 shrink-0"></i> <strong class="text-white">Sortie :</strong>&nbsp;${fullDate}</li>
                                    <li class="flex items-center gap-2"><i class="ph-fill ph-music-notes text-gray-500 shrink-0"></i> <strong class="text-white">Pistes :</strong>&nbsp;${currentAlbumData.trackCount || '?'}</li>
                                    <li class="flex items-center gap-2"><i class="ph-fill ph-vinyl-record text-gray-500 shrink-0"></i> <strong class="text-white">Genre :</strong>&nbsp;${currentAlbumData.primaryGenreName || '?'}</li>
                                </ul>
                            </div>
                            <div>
                                <h3 class="text-xs text-gray-500 uppercase font-bold tracking-widest mb-2">Production / Labels</h3>
                                <p class="text-gray-300 text-sm leading-relaxed">${currentAlbumData.copyright || "Informations non disponibles."}</p>
                            </div>
                        </div>
                        <div id="wiki-album-info" class="text-gray-300 leading-relaxed"><div class="flex items-center gap-3 text-pink-400 animate-pulse"><i class="ph ph-spinner-gap animate-spin text-xl"></i><span class="text-sm">Extraction des archives...</span></div></div>
                    </div>
                    <div id="tracklist-container"><div class="text-center py-16"><i class="ph-bold ph-vinyl-record animate-spin-slow text-5xl text-pink-500"></i><p class="text-gray-400 mt-4">Chargement des pistes...</p></div></div>
                </div>
            `;
            fetchWikiData(currentAlbumData.collectionName).then(w => {
                const el = document.getElementById('wiki-album-info'); if(!el) return;
                el.innerHTML = w?.extract ? `<h3 class="text-xs text-purple-400 uppercase font-bold tracking-widest mb-2 flex items-center gap-2"><i class="ph-fill ph-globe"></i> Source : Wikipédia</h3><p class="text-sm md:text-base font-light leading-relaxed">${w.extract}</p>` : `<p class="text-gray-500 italic text-sm">Aucune page dédiée trouvée.</p>`;
            });
            await loadAlbumTracks();
        }

        async function loadAlbumTracks() {
            const container = document.getElementById('tracklist-container'); if (!container || !currentAlbumData) return;
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${currentAlbumData.collectionId}&entity=song&country=us`);
                const data = await res.json();
                const tracks = (data.results || []).filter(i => i.wrapperType === 'track');
                if (tracks.length === 0) { container.innerHTML = `<div class="glass-panel p-6 rounded-2xl text-center"><p class="text-gray-400">Aucune piste trouvée.</p></div>`; return; }
                currentTracksData = tracks; await loadExistingRatings(); renderTracks();
            } catch(e) { container.innerHTML = `<div class="glass-panel p-6 rounded-2xl text-center border border-red-500/30"><p class="text-red-400">Erreur réseau.</p><button onclick="loadAlbumTracks()" class="mt-4 bg-white/10 px-4 py-2 rounded-xl text-sm">Réessayer</button></div>`; }
        }
        window.loadAlbumTracks = loadAlbumTracks;

        function renderTracks() {
            const container = document.getElementById('tracklist-container'); if (!container) return;
            let html = '<h2 class="text-xl md:text-2xl font-black mb-4 mt-8 flex items-center gap-2"><i class="ph-fill ph-list-numbers text-purple-500"></i> Analyses des Pistes</h2>';
            currentTracksData.forEach(track => {
                const ms = track.trackTimeMillis || 0; const mins = Math.floor(ms / 60000); const secs = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
                const ex = trackRatingsState[track.trackId] || { score: '', note: '' };
                const badge = track.trackExplicitness === 'explicit' ? '<span class="px-1.5 py-0.5 rounded bg-gray-800 text-[10px] font-black text-red-400">E</span>' : '';
                html += `
                    <div class="glass-panel p-4 md:p-5 rounded-2xl md:rounded-3xl flex flex-col xl:flex-row gap-4 border-l-4 border-l-transparent focus-within:border-l-pink-500 hover:bg-white/[0.02] transition-all group mb-3">
                        <div class="flex items-center gap-3 xl:w-[35%] min-w-0">
                            <span class="text-gray-500 font-black text-xl w-7 text-right">${track.trackNumber}.</span>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-base md:text-lg leading-tight text-white truncate">${track.trackName}</h3>
                                <div class="flex items-center gap-2 mt-1"><p class="text-xs text-gray-500 font-bold bg-white/5 px-2 py-0.5 rounded"><i class="ph-bold ph-clock"></i> ${mins}:${secs}</p>${badge}</div>
                            </div>
                        </div>
                        <div class="flex-1 flex flex-col sm:flex-row gap-3">
                            <textarea placeholder="Votre analyse..." class="flex-1 bg-black/40 border border-white/5 rounded-xl py-3 pl-4 pr-3 text-sm text-gray-200 focus:border-purple-500 h-12 md:h-14 resize-none" onchange="updateTrackState(${track.trackId}, 'note', this.value)">${(ex.note || '').replace(/</g,'&lt;')}</textarea>
                            <div class="flex items-center gap-2 bg-black/60 px-3 py-2 rounded-xl focus-within:border-pink-500 shrink-0 border border-white/10">
                                <i class="ph-fill ph-star text-yellow-500"></i>
                                <input type="number" min="0" max="10" step="0.1" value="${ex.score}" oninput="updateTrackState(${track.trackId}, 'score', this.value)" class="w-14 bg-transparent text-center text-xl font-black text-white focus:outline-none" placeholder="—">
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html; updateGlobalAverageDisplay();
        }

        async function loadExistingRatings() {
            if (!currentUser || !currentAlbumData) return;
            try {
                const { data } = await sb.from('album_ratings').select('track_ratings').eq('user_id', currentUser.id).eq('album_id', currentAlbumData.collectionId.toString()).maybeSingle();
                trackRatingsState = data?.track_ratings || {};
            } catch(e) { trackRatingsState = {}; }
        }

        window.updateTrackState = function(id, f, v) { if(!trackRatingsState[id]) trackRatingsState[id]={score:'',note:''}; trackRatingsState[id][f]=v; if(f==='score') updateGlobalAverageDisplay(); };
        function updateGlobalAverageDisplay() {
            const sc = Object.values(trackRatingsState).map(t => parseFloat(t.score)).filter(s => !isNaN(s) && s>=0 && s<=10);
            const d = document.getElementById('global-score-display'); if (!d) return;
            if (sc.length === 0) { d.textContent = '—'; d.className = 'text-5xl md:text-7xl font-black text-white'; return; }
            const avg = (sc.reduce((a, b) => a + b, 0) / sc.length).toFixed(1);
            d.textContent = avg; d.className = 'text-5xl md:text-7xl font-black ' + (avg >= 8 ? 'text-green-400' : avg >= 5 ? 'text-yellow-400' : 'text-red-400');
        }

        window.saveRatingsToDB = async function() {
            if (!currentUser) return showToast("Connectez-vous.", "error"); if (!currentAlbumData) return;
            const avg = parseFloat(document.getElementById('global-score-display').textContent) || 0;
            const p = { user_id: currentUser.id, album_id: currentAlbumData.collectionId.toString(), album_title: currentAlbumData.collectionName, artist_name: currentAlbumData.artistName, cover_url: currentAlbumData.artworkUrl100, global_rating: avg, track_ratings: trackRatingsState };
            try {
                const { data: ex } = await sb.from('album_ratings').select('id').eq('user_id', currentUser.id).eq('album_id', p.album_id);
                const { error } = ex?.length > 0 ? await sb.from('album_ratings').update(p).eq('id', ex[0].id) : await sb.from('album_ratings').insert([p]);
                if (error) throw error; showToast("Sauvegardé !", "success");
            } catch(e) { showToast("Erreur.", "error"); }
        };

        // ─── ARTIST VIEW ──────────────────────────────────────────────────────
        async function renderArtistView(container) {
            if (!currentArtistData) return switchView('search');
            container.innerHTML = `
                <div class="animate-fade-in pb-20">
                    <button onclick="switchView('search')" class="flex items-center gap-2 text-gray-400 hover:text-white mb-6 bg-white/5 px-4 py-2 rounded-full border border-white/10 text-sm"><i class="ph-bold ph-arrow-left"></i> Retour</button>
                    <div class="relative rounded-2xl md:rounded-[2.5rem] overflow-hidden mb-8 border border-white/10 shadow-2xl">
                        <div id="artist-banner-bg" class="absolute inset-0 z-0 bg-gray-900"></div>
                        <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] via-[#0a0a0f]/80 to-transparent z-0"></div>
                        <div class="relative z-10 p-6 md:p-16 flex flex-col md:flex-row items-center md:items-end gap-6 text-center md:text-left">
                            <div id="artist-pfp" class="w-32 h-32 md:w-56 md:h-56 rounded-full bg-white/5 border-4 border-white/10 flex items-center justify-center shrink-0 z-20 overflow-hidden"><i class="ph-fill ph-microphone-stage text-6xl text-gray-600"></i></div>
                            <div class="flex-1 z-20">
                                <h1 class="text-4xl md:text-7xl font-black mb-2">${currentArtistData.artistName}</h1>
                                <p class="text-xl text-pink-400 font-bold uppercase">${currentArtistData.primaryGenreName || 'Musique'}</p>
                            </div>
                        </div>
                    </div>
                    <div id="wiki-artist-info" class="glass-panel rounded-[2rem] p-8 mb-8"></div>
                    <h2 class="text-2xl font-black mb-6"><i class="ph-fill ph-disc text-purple-500"></i> Discographie</h2>
                    <div id="artist-albums-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
                </div>
            `;
            fetchWikiData(currentArtistData.artistName).then(w => { document.getElementById('wiki-artist-info').innerHTML = w?.extract ? `<p class="font-light">${w.extract}</p>` : `<p class="text-gray-500 italic">Biographie non disponible.</p>`; });
            try {
                const res = await fetch(`https://itunes.apple.com/lookup?id=${currentArtistData.artistId}&entity=album&limit=100&country=us`);
                const data = await res.json();
                const albums = (data.results || []).filter(i => i.wrapperType === 'collection').sort((a,b) => new Date(b.releaseDate)-new Date(a.releaseDate));
                const ac = document.getElementById('artist-albums-container');
                if(albums.length === 0) ac.innerHTML = `<p class="text-gray-400 col-span-full">Rien trouvé.</p>`;
                else {
                    albums.forEach(a => renderSearchAlbumCard(a, ac));
                    const img = albums[0].artworkUrl100.replace('100x100bb', '600x600bb');
                    document.getElementById('artist-pfp').innerHTML = `<img src="${img}" class="w-full h-full object-cover">`;
                    document.getElementById('artist-banner-bg').innerHTML = `<img src="${img}" class="w-full h-full object-cover blur-[100px] opacity-40 scale-125">`;
                }
            } catch(e) {}
        }
        window.goToArtistFromAlbum = async function() {
            if (!currentAlbumData) return;
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(currentAlbumData.artistName)}&entity=musicArtist&limit=1&country=us`);
                const d = await res.json(); if(d.results?.length > 0) { currentArtistData = d.results[0]; switchView('artist'); }
            } catch(e) {}
        };

        // ─── PROFILE ──────────────────────────────────────────────────────────
        async function renderProfile(container, targetUserId) {
            const isMyProfile = currentUser && (targetUserId === currentUser.id);
            container.innerHTML = `<div class="text-center py-20"><i class="ph-bold ph-vinyl-record animate-spin-slow text-6xl text-pink-500"></i></div>`;
            try {
                const prof = await loadUserProfile(targetUserId);
                const { data } = await sb.from('album_ratings').select('*').eq('user_id', targetUserId).order('created_at', { ascending: false });
                const ratings = data || [];
                let albumsHTML = ratings.length === 0 ? `<div class="col-span-full text-center py-16 glass-panel rounded-[2rem] border-dashed border-white/10"><i class="ph-fill ph-folder-open text-5xl text-gray-600 mb-3"></i><p class="text-gray-500">Journal vide.</p></div>` : '';
                ratings.forEach(r => {
                    albumsHTML += `
                        <div class="glass-panel p-3 rounded-2xl flex gap-4 group hover:bg-white/5 transition-all cursor-pointer shadow-lg border border-white/5" onclick="openRatedAlbum(${JSON.stringify(r).replace(/"/g, '&quot;')})">
                            <img src="${r.cover_url}" class="w-24 h-24 rounded-xl object-cover shrink-0">
                            <div class="flex flex-col justify-center min-w-0">
                                <h3 class="font-bold text-lg leading-tight mb-1 text-white truncate group-hover:text-pink-400">${r.album_title}</h3>
                                <p class="text-xs text-gray-400 mb-2 truncate">${r.artist_name}</p>
                                <div class="inline-flex items-center gap-1.5 bg-black/60 px-2 py-1 rounded border border-white/10 w-max"><i class="ph-fill ph-star text-yellow-500 text-sm"></i><span class="font-black text-white">${r.global_rating}</span></div>
                            </div>
                        </div>
                    `;
                });
                
                const actionBtns = isMyProfile ? `<button onclick="switchView('settings')" class="bg-white/10 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-white/20 transition-all"><i class="ph-fill ph-gear"></i> Paramètres</button>` : `<button class="bg-pink-600 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2" onclick="showToast('Abonné !')"><i class="ph-bold ph-user-plus"></i> S'abonner</button>`;

                container.innerHTML = `
                    <div class="animate-fade-in max-w-6xl mx-auto pb-12">
                        <div class="glass-panel rounded-2xl md:rounded-[3rem] p-6 md:p-14 mb-8 flex flex-col md:flex-row items-center gap-6 relative overflow-hidden shadow-2xl border-white/10">
                            <div class="absolute right-0 top-0 w-64 h-64 bg-gradient-to-bl from-pink-500/20 to-purple-600/10 blur-[80px] rounded-full"></div>
                            <div class="w-28 h-28 md:w-40 md:h-40 rounded-full bg-gray-800 p-1 flex items-center justify-center shrink-0 border-4 border-white/10 overflow-hidden z-10">
                                ${prof.avatar_url ? `<img src="${prof.avatar_url}" class="w-full h-full object-cover rounded-full">` : `<i class="ph-fill ph-user text-6xl text-gray-600"></i>`}
                            </div>
                            <div class="flex-1 text-center md:text-left z-10 w-full min-w-0">
                                <span class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-black uppercase mb-3 inline-block">${isMyProfile ? "Mon Espace" : "Profil Public"}</span>
                                <h1 class="text-3xl md:text-5xl font-black mb-1 truncate">${prof.display_name}</h1>
                                <p class="text-gray-400 text-xs mb-5 font-mono">ID: ${targetUserId.split('-')[0]}</p>
                                <div class="flex flex-wrap items-center justify-center md:justify-start gap-3">
                                    <div class="bg-black/50 border border-white/10 px-4 py-2 rounded-xl flex items-center gap-3">
                                        <div><span class="block text-xl font-black text-pink-400">${ratings.length}</span><span class="text-[9px] uppercase font-bold text-gray-500">Archives</span></div>
                                    </div>
                                    ${actionBtns}
                                </div>
                            </div>
                        </div>
                        <h2 class="text-2xl font-black mb-6 flex items-center gap-2"><i class="ph-fill ph-books text-purple-500"></i> Journal</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${albumsHTML}</div>
                    </div>
                `;
            } catch(e) {}
        }
        window.openRatedAlbum = function(r) { currentAlbumData = { collectionId: r.album_id, collectionName: r.album_title, artistName: r.artist_name, artworkUrl100: r.cover_url, trackCount:10, primaryGenreName:'', releaseDate: r.created_at, collectionViewUrl: '#' }; currentTracksData = []; trackRatingsState = r.track_ratings || {}; switchView('album'); };

        window.addEventListener('load', checkSession);
    })();
    </script>
</body>
</html>
