<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lehfilium - L'Archive Musicale</title>
    
    <!-- Tailwind CSS pour le design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0f; color: #ffffff; overflow-x: hidden; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-panel {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input:focus, textarea:focus { outline: none; }
        
        /* Loading Shimmer effect */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body class="selection:bg-pink-500 selection:text-white relative">

    <div class="fixed inset-0 z-0 pointer-events-none opacity-40 overflow-hidden">
        <div class="absolute top-[0%] left-[-10%] w-[500px] h-[500px] rounded-full bg-purple-600/30 blur-[120px] animate-float"></div>

            <h1 class="text-3xl font-black text-center mb-2">Lehfilium</h1>

            <div class="space-y-4">

    <script>
        const { createClient } = window.supabase;
        const SUPABASE_URL = 'https://ydzgypqykkwqqnqttaaj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlkemd5cHF5a2t3cXFucXR0YWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjM3NzcsImV4cCI6MjA5NjUzOTc3N30.ax7ZOCH9TffTXBwaR2Jd4gPH8c2rq5Do__gxsjylXOA';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Variables Globales
        let currentUser = null;

        let currentArtistData = null;

        // État de la recherche

        // Système de Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const isError = type === 'error';
            toast.className = `glass-panel ${isError ? 'bg-red-500/20 border-red-500/50' : 'bg-green-500/20 border-green-500/50'} px-6 py-4 rounded-2xl flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 shadow-2xl`;
            toast.innerHTML = `<i class="ph-fill ${isError ? 'ph-warning-circle text-red-400' : 'ph-check-circle text-green-400'} text-2xl"></i><span class="font-medium text-white">${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- AUTH & ROUTAGE ---
        async function checkSession() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                // Routing via URL (pour les profils partagés)
                const urlParams = new URLSearchParams(window.location.search);
                const sharedUserId = urlParams.get('user');
                
                if (sharedUserId) {
                    renderProfile(document.getElementById('main-content'), sharedUserId);
                    window.history.replaceState({}, document.title, window.location.pathname); // Nettoie l'URL
                } else {
                    switchView('home');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        }

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return showToast("Veuillez remplir tous les champs.", "error");

            let result;
            if(type === 'login') result = await supabaseClient.auth.signInWithPassword({ email, password });
            if(type === 'signup') result = await supabaseClient.auth.signUp({ email, password });

            if(result.error) showToast(result.error.message.includes("Invalid login") ? "Identifiants incorrects." : result.error.message, "error");
            else if (type === 'signup') showToast("Compte créé ! Vous pouvez vous connecter.", "success");
            else { showToast("Connexion réussie !", "success"); checkSession(); }
        }

        async function logOut() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            showToast("Déconnecté avec succès.", "success");
            checkSession();
        }

        function switchView(viewName) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-white/10', 'text-white');
                btn.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`nav-${viewName}`);
            if(activeBtn) {
                activeBtn.classList.remove('text-gray-500');
                activeBtn.classList.add('bg-white/10', 'text-white');
            }

            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if(viewName === 'home') renderHome(mainContent);
            if(viewName === 'search') renderSearch(mainContent);
            if(viewName === 'album') renderAlbumView(mainContent);
            if(viewName === 'artist') renderArtistView(mainContent);
            if(viewName === 'profile') renderProfile(mainContent, currentUser.id);
        }

        // --- API HELPERS (WIKIPEDIA & APPLE) ---
        async function fetchWikiData(query) {
            try {
                // Tente de trouver la page exacte en français
                let res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                if(res.ok) return await res.json();
                
                // Si non trouvé, tente avec "(groupe)" ou "(album)" ou "(musicien)"
                res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query + " (groupe)")}`);
                if(res.ok) return await res.json();
                
                res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query + " (album)")}`);
                if(res.ok) return await res.json();
                
                return null;
            } catch(e) { return null; }
        }

        // --- VUES ---
        function renderHome(container) {
            container.innerHTML = `
                <div class="animate-fade-in space-y-12 pb-12">
                    <!-- Hero Section -->
                    <div class="relative w-full h-[450px] md:h-[500px] rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(236,72,153,0.15)] group">
                        <div class="absolute inset-0 bg-gradient-to-r from-gray-900 via-purple-900/80 to-pink-900/60 z-10"></div>
                        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=2074" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                        <div class="relative z-20 h-full flex flex-col justify-center p-8 md:p-16 max-w-4xl">
                            <span class="px-4 py-1.5 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-xs font-bold tracking-widest uppercase w-max mb-6 text-pink-300">Bienvenue sur Lehfilium</span>
                            <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight drop-shadow-xl">
                                Archivez votre vie <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400">musicale.</span>
                            </h1>
                            <p class="text-lg md:text-xl text-gray-300 mb-8 max-w-2xl font-light">Lehfilium n'est pas qu'un outil de notation. C'est une encyclopédie vivante, sociale et complète qui vous permet de documenter, analyser et partager chaque vibration musicale.</p>
                            <button onclick="switchView('search')" class="bg-white text-black px-8 py-4 rounded-xl font-black w-max hover:scale-105 transition-transform flex items-center gap-3 shadow-[0_0_30px_rgba(255,255,255,0.3)]">
                                <i class="ph-bold ph-magnifying-glass text-xl"></i> Commencer la recherche
                            </button>
                        </div>
                    </div>

                    <!-- Features -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-slide-up" style="animation-delay: 0.2s">
                        <div class="glass-panel p-8 rounded-3xl border-t border-l border-white/10 hover:-translate-y-2 transition-transform duration-300">
                            <div class="w-14 h-14 bg-purple-500/20 rounded-2xl flex items-center justify-center mb-6 border border-purple-500/30">
                                <i class="ph-fill ph-database text-3xl text-purple-400"></i>
                            </div>
                            <h3 class="text-xl font-bold mb-3">Base de données infinie</h3>
                            <p class="text-gray-400 leading-relaxed">Connecté à de multiples sources mondiales (Apple, Wikipédia). Découvrez l'histoire complète derrière chaque album, les membres, et l'origine des œuvres.</p>
                        </div>
                        <div class="glass-panel p-8 rounded-3xl border-t border-l border-white/10 hover:-translate-y-2 transition-transform duration-300">
                            <div class="w-14 h-14 bg-pink-500/20 rounded-2xl flex items-center justify-center mb-6 border border-pink-500/30">
                                <i class="ph-fill ph-sliders-horizontal text-3xl text-pink-400"></i>
                            </div>
                            <h3 class="text-xl font-bold mb-3">Précision Chirurgicale</h3>
                            <p class="text-gray-400 leading-relaxed">Notez chaque chanson individuellement au dixième près (0.1). L'algorithme Lehfilium calculera la note globale de l'album avec une rigueur mathématique.</p>
                        </div>
                        <div class="glass-panel p-8 rounded-3xl border-t border-l border-white/10 hover:-translate-y-2 transition-transform duration-300">
                            <div class="w-14 h-14 bg-blue-500/20 rounded-2xl flex items-center justify-center mb-6 border border-blue-500/30">
                                <i class="ph-fill ph-users-three text-3xl text-blue-400"></i>
                            </div>
                            <h3 class="text-xl font-bold mb-3">Social & Public</h3>
                            <p class="text-gray-400 leading-relaxed">Générez votre profil public instantanément. Partagez votre journal, suivez l'avis de vos amis, et comparez vos goûts musicaux avec le monde entier.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSearch(container) {
            container.innerHTML = `
                <div class="animate-fade-in">
                    <form id="search-form" class="relative mb-6 max-w-4xl mx-auto">
                        <i class="ph ph-magnifying-glass absolute left-6 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl"></i>
                        <input id="search-input" type="text" value="${currentSearchQuery}" placeholder="Toxicity, Daft Punk, Kendrick..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 pl-16 pr-32 text-lg text-white focus:border-pink-500 backdrop-blur-md transition-all shadow-xl">
                        <button type="submit" class="absolute right-3 top-3 bottom-3 bg-gradient-to-r from-pink-600 to-purple-600 text-white rounded-xl px-8 font-bold transition-transform hover:scale-105">Rechercher</button>
                    </form>

                    <!-- Filtres stricts Lehfilium (Sans mention du nb de pistes) -->
                    <div class="flex flex-wrap justify-center gap-3 mb-10">
                        <button class="filter-btn px-6 py-2 rounded-full font-medium transition-all ${currentSearchFilter === 'tous' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('tous')">Tous</button>
                        <button class="filter-btn px-6 py-2 rounded-full font-medium transition-all ${currentSearchFilter === 'album' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('album')">Album</button>
                        <button class="filter-btn px-6 py-2 rounded-full font-medium transition-all ${currentSearchFilter === 'ep' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('ep')">EP</button>
                        <button class="filter-btn px-6 py-2 rounded-full font-medium transition-all ${currentSearchFilter === 'single' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('single')">Single</button>
                        <button class="filter-btn px-6 py-2 rounded-full font-medium transition-all ${currentSearchFilter === 'artist' ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}" onclick="setFilter('artist')">Artiste</button>
                    </div>

                    <div id="search-results" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-5 gap-6 pb-12"></div>
                </div>
            `;

            if(currentSearchQuery) executeSearch(currentSearchQuery);

            document.getElementById('search-form').addEventListener('submit', (e) => {
                e.preventDefault();
                currentSearchQuery = document.getElementById('search-input').value;
                executeSearch(currentSearchQuery);
            });
        }

        window.setFilter = function(type) {
            currentSearchFilter = type;
            switchView('search'); 
        };

        async function executeSearch(query) {
            if(!query) return;
            const resultsContainer = document.getElementById('search-results');
            resultsContainer.innerHTML = `<div class="col-span-full text-center py-20"><i class="ph ph-spinner-gap animate-spin text-5xl text-pink-500"></i><p class="text-gray-400 mt-4 font-medium tracking-wide">Interrogation des bases de données mondiales...</p></div>`;

            try {
                let results = [];
                
                if (currentSearchFilter === 'tous') {
                    // Fetch Albums ET Artistes en parallèle
                    const [resAlbums, resArtists] = await Promise.all([
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=100`),
                        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=musicArtist&limit=20`)
                    ]);
                    const dataAlbums = await resAlbums.json();
                    const dataArtists = await resArtists.json();
                    results = [...dataArtists.results, ...dataAlbums.results];
                } else if (currentSearchFilter === 'artist') {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=musicArtist&limit=50`);
                    const data = await res.json();
                    results = data.results;
                } else {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=200`);
                    const data = await res.json();
                    results = data.results;
                }
                
                resultsContainer.innerHTML = '';
                
                if(results.length === 0) {
                    resultsContainer.innerHTML = `<div class="col-span-full text-center py-20 bg-white/5 rounded-3xl border border-white/10"><i class="ph-fill ph-ghost text-6xl text-gray-600 mb-4"></i><p class="text-gray-400">Aucune archive trouvée pour "${query}".</p></div>`;
                    return;
                }

                // Filtrage et Tri Intelligent Lehfilium
                let filtered = results.filter(item => {
                    if (item.wrapperType === 'artist') return currentSearchFilter === 'tous' || currentSearchFilter === 'artist';
                    
                    const artistLow = item.artistName.toLowerCase();
                    if(artistLow.includes('karaoke') || artistLow.includes('tribute') || artistLow.includes('lullaby')) return false;

                    if(currentSearchFilter === 'album') return item.trackCount > 6;
                    if(currentSearchFilter === 'ep') return item.trackCount >= 4 && item.trackCount <= 6;
                    if(currentSearchFilter === 'single') return item.trackCount <= 3;
                    return true;
                });

                filtered.sort((a, b) => {
                    const nameA = a.wrapperType === 'artist' ? a.artistName : a.collectionName;
                    const nameB = b.wrapperType === 'artist' ? b.artistName : b.collectionName;
                    const aExact = nameA.toLowerCase() === query.toLowerCase() ? 1 : 0;
                    const bExact = nameB.toLowerCase() === query.toLowerCase() ? 1 : 0;
                    
                    if (aExact !== bExact) return bExact - aExact;
                    
                    // Artistes d'abord si exact, sinon albums triés par popularité (nb de tracks)
                    if (a.wrapperType === 'artist' && b.wrapperType !== 'artist') return -1;
                    if (a.wrapperType !== 'artist' && b.wrapperType === 'artist') return 1;
                    if (a.wrapperType !== 'artist' && b.wrapperType !== 'artist') return b.trackCount - a.trackCount;
                    return 0;
                });

                filtered.slice(0, 40).forEach(item => {
                    if (item.wrapperType === 'artist') renderSearchArtistCard(item, resultsContainer);
                    else renderSearchAlbumCard(item, resultsContainer);
                });
                
                if(filtered.length === 0) resultsContainer.innerHTML = `<p class="text-gray-400 col-span-full text-center py-10">Aucun résultat exact dans cette catégorie.</p>`;
                
            } catch(e) {
                resultsContainer.innerHTML = `<p class="text-red-400 col-span-full text-center">Erreur de connexion aux archives.</p>`;
            }
        }

        function renderSearchAlbumCard(album, container) {
            let badgeText = "Album";
            let badgeColor = "bg-purple-600";
            if (album.trackCount <= 3) { badgeText = "Single"; badgeColor = "bg-blue-600"; }
            else if (album.trackCount <= 6) { badgeText = "EP"; badgeColor = "bg-pink-600"; }

            const highResImage = album.artworkUrl100.replace('100x100bb', '600x600bb');
            
            const card = document.createElement('div');
            card.className = "group cursor-pointer animate-slide-up flex flex-col";
            card.innerHTML = `
                <div class="aspect-square rounded-2xl overflow-hidden mb-3 border border-white/10 relative shadow-lg bg-white/5">
                    <span class="absolute top-2 left-2 ${badgeColor} text-[10px] font-black px-2 py-0.5 rounded shadow-lg z-20 uppercase tracking-wider">${badgeText}</span>
                    <img src="${highResImage}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center z-10">

                `;

            });
            updateGlobalAverageDisplay();
        }

        window.updateTrackState = function(trackId, field, value) {
            if(!trackRatingsState[trackId]) trackRatingsState[trackId] = { score: '', note: '' };
            trackRatingsState[trackId][field] = value;
            if(field === 'score') updateGlobalAverageDisplay();
        };

        function updateGlobalAverageDisplay() {
            const scores = Object.values(trackRatingsState).map(t => parseFloat(t.score)).filter(s => !isNaN(s) && s >= 0 && s <= 10);
            let avg = 0;
            if(scores.length > 0) avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
            
            const display = document.getElementById('global-score-display');
            display.innerText = avg;
            
            display.classList.remove('text-green-400', 'text-yellow-400', 'text-red-400', 'text-white');
            if (avg === 0) display.classList.add('text-white');
            else if (avg >= 8) display.classList.add('text-green-400');
            else if (avg >= 5) display.classList.add('text-yellow-400');
            else display.classList.add('text-red-400');
        }

        window.saveRatingsToDB = async function() {
            if(!currentUser) return showToast("Veuillez vous connecter.", "error");
            const globalAvg = parseFloat(document.getElementById('global-score-display').innerText);
            
            const payload = {
                user_id: currentUser.id,
                album_id: currentAlbumData.collectionId.toString(),
                album_title: currentAlbumData.collectionName,
                artist_name: currentAlbumData.artistName,
                cover_url: currentAlbumData.artworkUrl100,
                global_rating: globalAvg,
                track_ratings: trackRatingsState
            };

            const { data: existing } = await supabaseClient.from('album_ratings').select('id').eq('user_id', currentUser.id).eq('album_id', payload.album_id);

            let error;
            if (existing && existing.length > 0) error = (await supabaseClient.from('album_ratings').update(payload).eq('id', existing[0].id)).error;
            else error = (await supabaseClient.from('album_ratings').insert([payload])).error;

            if (error) showToast("Erreur BD. Vérifiez la politique RLS.", "error");
            else showToast("Archive Lehfilium sauvegardée avec succès !", "success");
        };

                                <div class="inline-flex items-center gap-2 bg-black/60 px-4 py-2 rounded-xl border border-white/10">
                                    <i class="ph-fill ph-star text-yellow-500"></i>
                                    <span class="font-black text-xl text-white">${rating.global_rating}</span>
                                </div>
                                <span class="text-xs text-gray-600 font-bold uppercase tracking-wider">${new Date(rating.created_at).toLocaleDateString('fr-FR')}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Boutons d'actions selon le type de profil
            const actionButtons = isMyProfile ? `
                <button onclick="shareProfile('${currentUser.id}')" class="bg-white text-black px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:scale-105 transition-transform">
                    <i class="ph-bold ph-share-network"></i> Partager mon profil
                </button>
            ` : `
                <button onclick="simulateFollow()" id="follow-btn" class="bg-pink-600 hover:bg-pink-500 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all">
                    <i class="ph-bold ph-user-plus"></i> S'abonner
                </button>
                <button onclick="showToast('Demande d\\'ami envoyée !', 'success')" class="bg-white/10 hover:bg-white/20 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition-all">
                    <i class="ph-bold ph-hands-clapping"></i> Ami
                </button>
            `;

            const userEmailDisplay = isMyProfile ? currentUser.email : "Utilisateur Public";
            const userNameDisplay = isMyProfile ? currentUser.email.split('@')[0] : "Membre Lehfilium";

            container.innerHTML = `
                <div class="animate-fade-in max-w-6xl mx-auto pb-12">
                    <!-- HEADER PROFIL -->
                    <div class="glass-panel rounded-[3rem] p-8 md:p-14 mb-12 flex flex-col md:flex-row items-center gap-10 relative overflow-hidden shadow-2xl border-white/10">
                        <div class="absolute right-0 top-0 w-96 h-96 bg-gradient-to-bl from-pink-500/20 to-purple-600/10 blur-[80px] rounded-full pointer-events-none"></div>
                        
                        <div class="w-36 h-36 md:w-48 md:h-48 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 p-1.5 flex items-center justify-center relative z-10 shadow-[0_0_50px_rgba(236,72,153,0.3)] shrink-0">
                            <div class="w-full h-full bg-[#1a1a24] rounded-full flex items-center justify-center border-[6px] border-[#0a0a0f] overflow-hidden relative">
                                <i class="ph-fill ph-user text-[80px] text-white/30"></i>
                            </div>
                        </div>
                        
                        <div class="flex-1 text-center md:text-left z-10 w-full">
                            <span class="px-4 py-1.5 bg-white/10 rounded-full text-xs font-black tracking-widest uppercase mb-4 inline-block text-pink-300 border border-white/5">${isMyProfile ? "Mon Espace" : "Profil Public"}</span>
                            <h1 class="text-5xl font-black mb-2 tracking-tight">${userNameDisplay}</h1>
                            <p class="text-gray-400 font-medium mb-8 flex items-center justify-center md:justify-start gap-2">
                                <i class="ph-fill ph-identification-badge text-gray-500 text-xl"></i> ID: ${targetUserId.split('-')[0]}...
                            </p>
                            
                            <div class="flex flex-wrap items-center justify-center md:justify-start gap-4">
                                <div class="bg-black/50 border border-white/10 px-6 py-3 rounded-2xl flex items-center gap-4">
                                    <div class="text-left">
                                        <span class="block text-2xl font-black text-pink-400 leading-none">${ratings.length}</span>
                                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Archives</span>
                                    </div>
                                    <div class="w-px h-8 bg-white/10"></div>
                                    <div class="text-left">
                                        <span id="followers-count" class="block text-2xl font-black text-purple-400 leading-none">${isMyProfile ? "0" : "12"}</span>
                                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Abonnés</span>
                                    </div>
                                </div>
                                ${actionButtons}
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between mb-8 border-b border-white/10 pb-4">
                        <h2 class="text-3xl font-black flex items-center gap-3"><i class="ph-fill ph-books text-purple-500"></i> ${isMyProfile ? "Mon Journal" : "Son Journal"}</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                        ${albumsHTML}
                    </div>
                </div>
            `;
        }

        window.shareProfile = function(userId) {
            const url = window.location.origin + window.location.pathname + "?user=" + userId;
            navigator.clipboard.writeText(url).then(() => {
                showToast("Lien du profil copié ! Vous pouvez l'envoyer à vos amis.", "success");
            });
        };

        window.simulateFollow = function() {
            const btn = document.getElementById('follow-btn');
            const count = document.getElementById('followers-count');
            if(btn.innerText.includes("S'abonner")) {
                btn.innerHTML = `<i class="ph-bold ph-check"></i> Abonné`;
                btn.classList.replace('bg-pink-600', 'bg-white/20');
                count.innerText = parseInt(count.innerText) + 1;
                showToast("Vous êtes maintenant abonné à ce profil !", "success");
            } else {
                btn.innerHTML = `<i class="ph-bold ph-user-plus"></i> S'abonner`;
                btn.classList.replace('bg-white/20', 'bg-pink-600');
                count.innerText = parseInt(count.innerText) - 1;
                showToast("Désabonnement réussi.", "success");
            }
        };

        window.onload = () => checkSession();
    </script>
</body>
</html>
